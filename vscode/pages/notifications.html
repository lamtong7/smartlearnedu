<body>

    <div id="public-navbar"></div>

                                </div>

                                </div>

                    <div class="d-flex gap-2 justify-content-center">

                        <button type="button" class="btn btn-primary fw-semibold px-4 py-2" style="border-radius: 10px;"><i class="bi bi-download me-1"></i> <span data-i18n="download_pdf">ទាញយក PDF</span></button>
                        <button type="button" class="btn btn-light fw-semibold px-4 py-2 border" style="border-radius: 10px;"><i class="bi bi-share me-1"></i> <span data-i18n="share">ចែករំលែក</span></button>

                    'group_today': 'ថ្ងៃនេះ', 'group_yesterday': 'ម្សិលមិញ', 'group_older': 'ចាស់ជាងនេះ',
                    'cert_title': 'វិញ្ញាបនបត្របញ្ជាក់ការសិក្សា', 'cert_desc': 'នេះជាការបញ្ជាក់ថាអ្នកបានបញ្ចប់វគ្គសិក្សាដោយជោគជ័យ។',
                    'cert_success_msg': 'បានបញ្ចប់វគ្គសិក្សាដោយជោគជ័យ', 'date_label': 'កាលបរិច្ឆេទ', 'cert_id_label': 'លេខសម្គាល់វិញ្ញាបនបត្រ',
                    'close': 'បិទ', 'download_pdf': 'ទាញយក PDF', 'share': 'ចែករំលែក',
                    
                    'notif_1_title': 'កិច្ចការត្រូវបានដាក់ពិន្ទុ: កម្រងសំណួរ HTML ចុងក្រោយ', 'notif_1_desc': 'គ្រូបង្រៀនរបស់អ្នក Sarah Johnson បានដាក់ពិន្ទុលើការបញ្ជូនរបស់អ្នក។ អ្នកទទួលបានពិន្ទុ 95/100។',
                    'notif_2_title': 'ទទួលបានវិញ្ញាបនបត្រថ្មី!', 'notif_2_desc': 'សូមអបអរសាទរ! អ្នកបានបញ្ចប់ "វគ្គបណ្តុះបណ្តាលសរសេរកូដ Python" ដោយជោគជ័យ និងទទួលបានវិញ្ញាបនបត្រថ្មីមួយ។',
                    'notif_3_title': 'វគ្គសិក្សាថ្មីអាចចូលរៀនបាន: Advanced React Patterns', 'notif_3_desc': 'វគ្គសិក្សាថ្មីដែលត្រូវនឹងចំណាប់អារម្មណ៍របស់អ្នកត្រូវបានបោះពុម្ពផ្សាយហើយ។ ចុះឈ្មោះឥឡូវនេះដើម្បីទទួលបានការបញ្ចុះតម្លៃ 20%។',
                    'notif_4_title': 'សារថ្មីពី Emma Brown', 'notif_4_desc': '"ខ្ញុំនឹងផ្ញើឯកសារតាមក្រោយ។ ប្រាប់ខ្ញុំប្រសិនបើអ្នកត្រូវការអ្វីផ្សេងទៀត..."',
                    'notif_5_title': 'ការរំលឹកពីកិច្ចការ', 'notif_5_desc': 'កិច្ចការ "ការរចនាទំព័រចុះចត (Landing Page) ដែលអាចបត់បែនបាន" របស់អ្នកនឹងផុតកំណត់នៅថ្ងៃស្អែក។ សូមប្រាកដថាបានបញ្ជូនវាឲ្យទាន់ពេលវេលា។',
                    'notif_6_title': 'ការដាស់តឿនសុវត្ថិភាព: ការចូលគណនីថ្មី', 'notif_6_desc': 'យើងបានកត់សម្គាល់ការចូលគណនី Smart Learn របស់អ្នកពីឧបករណ៍ថ្មី (Mac OS, Chrome)។ ប្រសិនបើនេះជាអ្នក អ្នកអាចមិនអើពើនឹងសារនេះ។',
                    
                    'time_2_hours_ago': '2 ម៉ោងមុន', 'time_5_hours_ago': '5 ម៉ោងមុន', 'time_8_hours_ago': '8 ម៉ោងមុន',
                    'time_yesterday_430': 'ម្សិលមិញម៉ោង 4:30 ល្ងាច', 'time_yesterday_900': 'ម្សិលមិញម៉ោង 9:00 ព្រឹក', 'time_oct_15': '15 តុលា 2026'
                },
                'en': {
                    'notifs_title': 'Notifications', 'btn_mark_all_read': 'Mark all as read',
                    'group_today': 'Today', 'group_yesterday': 'Yesterday', 'group_older': 'Older',
                    'cert_title': 'Certificate of Completion', 'cert_desc': 'This certifies that you have successfully completed the course.',
                    'cert_success_msg': 'successfully completed the course', 'date_label': 'Date', 'cert_id_label': 'Certificate ID',
                    'close': 'Close', 'download_pdf': 'Download PDF', 'share': 'Share',
                    
                    'notif_1_title': 'Assignment Graded: Final HTML Quiz', 'notif_1_desc': 'Your instructor Sarah Johnson has graded your submission. You scored 95/100.',
                    'notif_2_title': 'New Certificate Earned!', 'notif_2_desc': 'Congratulations! You have successfully completed "Python for Data Science" and earned a new certificate.',
                    'notif_3_title': 'New Course Available: Advanced React Patterns', 'notif_3_desc': 'A new course matching your interests has been published. Enroll now to get a 20% discount.',
                    'notif_4_title': 'New message from Emma Brown', 'notif_4_desc': '"I will send the files later. Let me know if you need anything else..."',
                    'notif_5_title': 'Assignment Reminder', 'notif_5_desc': 'Your assignment "Responsive Landing Page Design" is due tomorrow. Please make sure to submit it on time.',
                    'notif_6_title': 'Security Alert: New Login', 'notif_6_desc': 'We noticed a login to your Smart Learn account from a new device (Mac OS, Chrome). If this was you, you can ignore this message.',
                    
                    'time_2_hours_ago': '2 hours ago', 'time_5_hours_ago': '5 hours ago', 'time_8_hours_ago': '8 hours ago',
                    'time_yesterday_430': 'Yesterday at 4:30 PM', 'time_yesterday_900': 'Yesterday at 9:00 AM', 'time_oct_15': 'Oct 15, 2026'
                }
            };

            const notificationContainer = document.getElementById('notification-container');
            let notificationsData = [];

            function applyPageTranslations() {
                const lang = localStorage.getItem('language') || 'km';
                const t = pageTranslations[lang] || pageTranslations['km'];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (t[key]) el.innerHTML = t[key];
                });
                renderNotifications();
            }
            document.addEventListener('languageChanged', applyPageTranslations);

            // មុខងារសម្រាប់ Render សារជូនដំណឹង
            function renderNotifications() {
                if (!notificationContainer) return;
                const lang = localStorage.getItem('language') || 'km';
                const tr = (key) => pageTranslations[lang] ? pageTranslations[lang][key] : key;

                const groupedNotifs = notificationsData.reduce((acc, notif) => {
                    const group = notif.dateGroup;
                    if (!acc[group]) {
                        acc[group] = [];
                    }
                    acc[group].push(notif);
                    return acc;
                }, {});

                let html = '';
                const groupOrder = ['today', 'yesterday', 'older'];
                const groupTitles = {
                    today: tr('group_today'),
                    yesterday: tr('group_yesterday'),
                    older: tr('group_older')
                };

                groupOrder.forEach(groupKey => {
                    if (groupedNotifs[groupKey] && groupedNotifs[groupKey].length > 0) {
                        html += `<span class="notification-date-label">${groupTitles[groupKey]}</span>`;
                        html += groupedNotifs[groupKey].map(notif => {
                            const unreadClass = notif.unread ? 'unread shadow-sm' : '';
                            const unreadDot = notif.unread ? '<div class="unread-dot"></div>' : '';
                            
                            return `
                                <a href="${notif.link}" class="notification-card ${unreadClass}" data-id="${notif.id}">
                                    <div class="notification-icon ${notif.iconClass}"><i class="bi ${notif.icon}"></i></div>
                                    <div class="notification-content">
                                        <div class="notification-title">${tr(notif.titleKey)}</div>
                                        <div class="notification-desc">${tr(notif.descKey)}</div>
                                        <div class="notification-time"><i class="bi bi-clock"></i> ${tr(notif.timeKey)}</div>
                                    </div>
                                    ${unreadDot}
                                    <div class="position-relative ms-2" style="z-index: 10;">
                                        <button class="delete-notification-btn" title="លុប"><i class="bi bi-trash"></i></button>
                                    </div>
                                </a>
                            `;
                        }).join('');
                    }
                });

                notificationContainer.innerHTML = html;
                addDeleteFunctionality();
            }

            // មុខងារសម្រាប់លុបសារជូនដំណឹង
            function addDeleteFunctionality() {
                const deleteBtns = document.querySelectorAll('.delete-notification-btn');
                deleteBtns.forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();

                        const card = this.closest('.notification-card');
                        const notifId = parseInt(card.getAttribute('data-id'));

                        if (card) {
                            card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                            card.style.opacity = '0';
                            card.style.transform = 'translateX(20px)';

                            setTimeout(() => {
                                notificationsData = notificationsData.filter(n => n.id !== notifId);
                                renderNotifications(); // Render ឡើងវិញបន្ទាប់ពីលុប
                                localStorage.setItem('notifications_db', JSON.stringify(notificationsData)); // ធ្វើបច្ចុប្បន្នភាពចូល LocalStorage
                            }, 300);
                        }
                    });
                });
            }

            // មុខងារ "សម្គាល់ថាបានអានទាំងអស់"
            const markAllReadBtn = document.getElementById('markAllReadBtn');
            if (markAllReadBtn) {
                markAllReadBtn.addEventListener('click', () => {
                    notificationsData.forEach(n => n.unread = false);
                    renderNotifications();
                    localStorage.setItem('notifications_db', JSON.stringify(notificationsData)); // ធ្វើបច្ចុប្បន្នភាពចូល LocalStorage
                });
            }

            // ទាញយកទិន្នន័យ និងចាប់ផ្តើម Render
            async function initializePage() {
                try {
                    // អានទិន្នន័យពី LocalStorage ជាមុនសិន
                    const localNotifications = localStorage.getItem('notifications_db');
                    
                    if (localNotifications) {
                        notificationsData = JSON.parse(localNotifications);
                    } else {
                        // ទិន្នន័យបម្រុង (Fallback Data) ក្នុងករណីមិនទាន់មានទិន្នន័យក្នុង LocalStorage
                        notificationsData = [
                            { id: 1, dateGroup: "today", unread: true, link: "assignments.html", iconClass: "icon-success", icon: "bi-journal-check", title: "កិច្ចការត្រូវបានដាក់ពិន្ទុ: កម្រងសំណួរ HTML ចុងក្រោយ", titleKey: "notif_1_title", desc: "គ្រូបង្រៀនរបស់អ្នក Sarah Johnson បានដាក់ពិន្ទុលើការបញ្ជូនរបស់អ្នក។ អ្នកទទួលបានពិន្ទុ 95/100។", descKey: "notif_1_desc", time: "2 ម៉ោងមុន", timeKey: "time_2_hours_ago" },
