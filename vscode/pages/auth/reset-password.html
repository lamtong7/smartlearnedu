<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Learn - បង្កើតពាក្យសម្ងាត់ថ្មី</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="../../assets/css/style.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Kantumruy Pro', 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }
        .auth-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 15px;
        }
        .auth-card {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.04);
            border: 1px solid #f1f5f9;
            margin: 0 auto;
            transition: all 0.3s ease;
        }
        
        /* បន្ថែមចលនាសម្រាប់ Password Strength */
        .password-strength-meter { transition: all 0.3s ease; }
        .strength-bar { transition: all 0.3s ease; }

        body.dark-mode {
            background-color: #0f172a !important;
        }
        body.dark-mode .auth-card {
            background: #1e293b !important;
            border-color: #334155 !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2) !important;
        }
    </style>
</head>
<body>
    <!-- ប៊ូតុងប្តូរ Dark/Light Mode -->
    <button class="btn btn-light position-fixed top-0 end-0 m-4 shadow-sm border border-light-subtle" id="authThemeToggle" style="border-radius: 50%; width: 45px; height: 45px; z-index: 1000;">
        <i class="bi bi-moon-stars-fill"></i>
    </button>

    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 70px; height: 70px;">
                    <i class="bi bi-shield-lock" style="font-size: 32px;"></i>
                </div>
                <h4 class="fw-bold mb-1" data-i18n="reset_pwd_title">បង្កើតពាក្យសម្ងាត់ថ្មី</h4>
                <p class="text-muted small" data-i18n="reset_pwd_desc">ពាក្យសម្ងាត់ថ្មីរបស់អ្នកត្រូវតែខុសពីពាក្យសម្ងាត់ដែលធ្លាប់ប្រើពីមុន។</p>
            </div>

            <form id="resetPasswordForm" novalidate>
                <div class="mb-3">
                    <label class="form-label small fw-semibold" data-i18n="new_pwd_label">ពាក្យសម្ងាត់ថ្មី</label>
                    <div class="position-relative">
                        <input type="password" class="form-control pe-5" id="newPassword" placeholder="បញ្ចូលពាក្យសម្ងាត់ថ្មី" data-i18n="new_pwd_ph" required minlength="8">
                        <button type="button" class="btn btn-link text-muted position-absolute end-0 top-50 translate-middle-y text-decoration-none p-0 pe-3 toggle-password">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                        <div class="invalid-feedback" data-i18n="pwd_length_feedback">ពាក្យសម្ងាត់ត្រូវមានយ៉ាងហោចណាស់ ៨ តួអក្សរ។</div>
                    </div>
                </div>
                <!-- Password Strength Meter -->
                <div class="password-strength-meter mb-3 d-none" id="passwordStrengthContainer">
                    <div class="d-flex gap-1 mb-1">
                        <div class="strength-bar flex-grow-1 bg-light rounded-pill" style="height: 4px;" id="bar1"></div>
                        <div class="strength-bar flex-grow-1 bg-light rounded-pill" style="height: 4px;" id="bar2"></div>
                        <div class="strength-bar flex-grow-1 bg-light rounded-pill" style="height: 4px;" id="bar3"></div>
                        <div class="strength-bar flex-grow-1 bg-light rounded-pill" style="height: 4px;" id="bar4"></div>
                    </div>
                    <div class="small text-muted fw-semibold" style="font-size: 11px;" id="strengthText" data-i18n="pwd_weak">ពាក្យសម្ងាត់ខ្សោយ</div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold" data-i18n="confirm_pwd_label">បញ្ជាក់ពាក្យសម្ងាត់ថ្មី</label>
                    <div class="position-relative">
                        <input type="password" class="form-control pe-5" id="confirmPassword" placeholder="បញ្ចូលពាក្យសម្ងាត់ថ្មីម្តងទៀត" data-i18n="confirm_pwd_ph" required minlength="8">
                        <button type="button" class="btn btn-link text-muted position-absolute end-0 top-50 translate-middle-y text-decoration-none p-0 pe-3 toggle-password">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                        <div class="invalid-feedback" data-i18n="pwd_match_feedback">ពាក្យសម្ងាត់មិនផ្ទៀងផ្ទាត់គ្នាទេ។</div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="submitResetBtn" data-i18n="btn_reset_pwd">ផ្លាស់ប្តូរពាក្យសម្ងាត់</button>
            </form>

            <div class="text-center mt-4">
                <a href="login.html" class="text-muted small text-decoration-none fw-semibold"><i class="bi bi-arrow-left me-1"></i> <span data-i18n="back_to_login">ត្រឡប់ទៅទំព័រចូលគណនីវិញ</span></a>
            </div>
        </div>
    </div>

    <script src="../../assets/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // វចនានុក្រមបកប្រែ
            const pageTranslations = {
                'km': {
                    'reset_pwd_title': 'បង្កើតពាក្យសម្ងាត់ថ្មី', 'reset_pwd_desc': 'ពាក្យសម្ងាត់ថ្មីរបស់អ្នកត្រូវតែខុសពីពាក្យសម្ងាត់ដែលធ្លាប់ប្រើពីមុន។',
                    'new_pwd_label': 'ពាក្យសម្ងាត់ថ្មី', 'new_pwd_ph': 'បញ្ចូលពាក្យសម្ងាត់ថ្មី', 'pwd_length_feedback': 'ពាក្យសម្ងាត់ត្រូវមានយ៉ាងហោចណាស់ ៨ តួអក្សរ។',
                    'confirm_pwd_label': 'បញ្ជាក់ពាក្យសម្ងាត់ថ្មី', 'confirm_pwd_ph': 'បញ្ចូលពាក្យសម្ងាត់ថ្មីម្តងទៀត', 'pwd_match_feedback': 'ពាក្យសម្ងាត់មិនផ្ទៀងផ្ទាត់គ្នាទេ។',
                    'pwd_weak': 'ពាក្យសម្ងាត់ខ្សោយ', 'pwd_medium': 'ពាក្យសម្ងាត់មធ្យម', 'pwd_strong': 'ពាក្យសម្ងាត់រឹងមាំ',
                    'btn_reset_pwd': 'ផ្លាស់ប្តូរពាក្យសម្ងាត់', 'back_to_login': 'ត្រឡប់ទៅទំព័រចូលគណនីវិញ',
                    'processing': 'កំពុងដំណើរការ...', 'success_title': 'ជោគជ័យ!', 'success_desc': 'ពាក្យសម្ងាត់របស់អ្នកត្រូវបានផ្លាស់ប្តូរដោយជោគជ័យ។', 'login_now': 'ចូលគណនីឥឡូវនេះ'
                },
                'en': {
                    'reset_pwd_title': 'Create New Password', 'reset_pwd_desc': 'Your new password must be different from previous used passwords.',
                    'new_pwd_label': 'New Password', 'new_pwd_ph': 'Enter new password', 'pwd_length_feedback': 'Password must be at least 8 characters long.',
                    'confirm_pwd_label': 'Confirm New Password', 'confirm_pwd_ph': 'Enter new password again', 'pwd_match_feedback': 'Passwords do not match.',
                    'pwd_weak': 'Weak Password', 'pwd_medium': 'Medium Password', 'pwd_strong': 'Strong Password',
                    'btn_reset_pwd': 'Reset Password', 'back_to_login': 'Back to login',
                    'processing': 'Processing...', 'success_title': 'Success!', 'success_desc': 'Your password has been changed successfully.', 'login_now': 'Login Now'
                }
            };

            function applyPageTranslations() {
                const lang = localStorage.getItem('language') || 'km';
                const t = pageTranslations[lang] || pageTranslations['km'];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (t[key]) {
                        if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) el.placeholder = t[key];
                        else el.innerHTML = t[key];
                    }
                });
            }
            document.addEventListener('languageChanged', applyPageTranslations);
            applyPageTranslations();

            // មុខងារប្តូរ Dark Mode
            const authThemeToggle = document.getElementById('authThemeToggle');
            if (authThemeToggle) {
                if (document.body.classList.contains('dark-mode')) authThemeToggle.querySelector('i').className = 'bi bi-sun-fill text-warning';
                authThemeToggle.addEventListener('click', function() {
                    if (window.toggleTheme) window.toggleTheme();
                    const isDark = document.body.classList.contains('dark-mode');
                    this.querySelector('i').className = isDark ? 'bi bi-sun-fill text-warning' : 'bi bi-moon-stars-fill';
                });
            }

            // មុខងារបង្ហាញ/លាក់ពាក្យសម្ងាត់ (Toggle Password Visibility)
            const toggleButtons = document.querySelectorAll('.toggle-password');
            toggleButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const input = this.previousElementSibling;
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    
                    const icon = this.querySelector('i');
                    icon.classList.toggle('bi-eye');
                    icon.classList.toggle('bi-eye-slash');
                });
            });

            // មុខងារត្រួតពិនិត្យទម្រង់ និងបញ្ជូនទិន្នន័យ (Form Validation & Submission)
            const form = document.getElementById('resetPasswordForm');
            const newPassword = document.getElementById('newPassword');
            const confirmPassword = document.getElementById('confirmPassword');
            const submitBtn = document.getElementById('submitResetBtn');

            // មុខងារត្រួតពិនិត្យភាពខ្លាំងនៃពាក្យសម្ងាត់ (Password Strength Meter)
            const strengthContainer = document.getElementById('passwordStrengthContainer');
            const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
            const strengthText = document.getElementById('strengthText');

            if (newPassword && strengthContainer) {
                newPassword.addEventListener('input', function() {
                    const val = this.value;
                    const lang = localStorage.getItem('language') || 'km';
                    const t = pageTranslations[lang] || pageTranslations['km'];

                    if (val.length > 0) {
                        strengthContainer.classList.remove('d-none');
                    } else {
                        strengthContainer.classList.add('d-none');
                        return;
                    }

                    let strength = 0;
                    if (val.length >= 8) strength += 1;
                    if (val.match(/[a-z]/) && val.match(/[A-Z]/)) strength += 1;
                    if (val.match(/\d/)) strength += 1;
                    if (val.match(/[^a-zA-Z\d]/)) strength += 1;

                    bars.forEach(bar => bar.className = 'strength-bar flex-grow-1 bg-light rounded-pill');

                    if (strength <= 1) {
                        bars[0].classList.replace('bg-light', 'bg-danger');
                        if (strength === 1) bars[1].classList.replace('bg-light', 'bg-danger');
                        strengthText.textContent = t['pwd_weak'];
                        strengthText.className = 'small fw-semibold text-danger';
                    } else if (strength === 2 || strength === 3) {
                        bars[0].classList.replace('bg-light', 'bg-warning');
                        bars[1].classList.replace('bg-light', 'bg-warning');
                        bars[2].classList.replace('bg-light', 'bg-warning');
                        strengthText.textContent = t['pwd_medium'];
                        strengthText.className = 'small fw-semibold text-warning';
                    } else if (strength >= 4) {
                        bars.forEach(bar => bar.classList.replace('bg-light', 'bg-success'));
                        strengthText.textContent = t['pwd_strong'];
                        strengthText.className = 'small fw-semibold text-success';
                    }
                });
            }

            if (form && newPassword && confirmPassword && submitBtn) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    let isValid = true;

                    // ពិនិត្យប្រវែងពាក្យសម្ងាត់
                    if (newPassword.value.length < 8) {
                        newPassword.classList.add('is-invalid');
                        isValid = false;
                    } else {
                        newPassword.classList.remove('is-invalid');
                    }

                    // ពិនិត្យថាតើពាក្យសម្ងាត់ទាំង២ដូចគ្នាដែរឬទេ
                    if (newPassword.value !== confirmPassword.value || confirmPassword.value === '') {
                        confirmPassword.classList.add('is-invalid');
                        isValid = false;
                    } else {
                        confirmPassword.classList.remove('is-invalid');
                    }

                    // ប្រសិនបើត្រឹមត្រូវទាំងអស់
                    if (isValid) {
                        const lang = localStorage.getItem('language') || 'km';
                        const t = pageTranslations[lang] || pageTranslations['km'];

                        const originalText = submitBtn.innerHTML;
                        submitBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> ${t['processing']}`;
                        submitBtn.disabled = true;

                        setTimeout(() => {
                            submitBtn.innerHTML = originalText;
                            submitBtn.disabled = false;
                            Swal.fire({
                                icon: 'success',
                                title: t['success_title'],
                                text: t['success_desc'],
                                confirmButtonColor: '#2563eb',
                                confirmButtonText: t['login_now']
                            }).then(() => {
                                window.location.href = 'login.html';
                            });
                        }, 1500);
                    }
                });
            }
        });
    </script>
</body>
</html>
