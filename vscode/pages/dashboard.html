<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Learn - ផ្ទាំងគ្រប់គ្រង</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="../assets/css/style.css" rel="stylesheet">
    <!-- <link href="../assets/css/dashboard.css" rel="stylesheet"> -->
    <style>
        /* Super Ultra Clean Modern Dashboard UI */
        .welcome-banner {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1e3a8a 100%);
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.15);
        }

        body.dark-mode .welcome-banner {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .stat-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(0, 0, 0, 0.02);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .stat-content h3 {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 4px 0;
            color: var(--text-dark);
            line-height: 1.2;
        }

        .stat-content p {
            margin: 0;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .content-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 28px;
            border: 1px solid rgba(0, 0, 0, 0.02);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        .card-header-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .continue-course-banner {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px;
            padding: 32px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);
            position: relative;
            overflow: hidden;
            flex-wrap: wrap;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .continue-course-banner:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(15, 23, 42, 0.25);
        }

        .continue-course-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .continue-course-banner h4 {
            font-weight: 800;
            font-size: 20px;
            margin-bottom: 8px;
            color: white;
        }

        .continue-course-banner p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .continue-course-banner .progress-light {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }

        .continue-course-banner .progress-bar {
            background: #3b82f6;
            border-radius: 10px;
        }

        .continue-course-banner .badge {
            background: rgba(255, 255, 255, 0.1) !important;
            color: #60a5fa !important;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .task-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-radius: 16px;
            background: #f8fafc;
            margin-bottom: 12px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .task-list-item:hover {
            background: #ffffff;
            border-color: #e2e8f0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
            transform: translateX(4px);
        }

        .task-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        body.dark-mode .stat-card,
        body.dark-mode .content-card {
            background: linear-gradient(145deg, var(--surface-color) 0%, #151e2f 100%);
            border-color: var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        body.dark-mode .task-list-item {
            background: rgba(15, 23, 42, 0.4);
        }

        body.dark-mode .task-list-item:hover {
            background: #334155;
            border-color: var(--border-color);
        }

        /* ពណ៌ Highlight ព្រិលៗតាមប្រភេទកាតនីមួយៗ ពេល Hover ក្នុង Dark Mode */
        body.dark-mode .stat-card-primary:hover {
            background: rgba(37, 99, 235, 0.15);
        }

        body.dark-mode .stat-card-success:hover {
            background: rgba(16, 185, 129, 0.15);
        }

        body.dark-mode .stat-card-warning:hover {
            background: rgba(245, 158, 11, 0.15);
        }

        body.dark-mode .stat-card-info:hover {
            background: rgba(14, 165, 233, 0.15);
        }
    </style>
</head>

<body>
    <!-- Public Navbar Component -->
    <div id="public-navbar"></div>
    <aside class="dashboard-sidebar" id="app-sidebar"></aside>
    <div class="dashboard-main-view">
        <div class="workspace-container">
            <!-- Welcome Banner -->
            <div class="welcome-banner p-4 p-md-5 rounded-4 mb-4 position-relative overflow-hidden reveal-on-scroll">
                <div class="position-absolute top-0 end-0 opacity-25"
                    style="width: 300px; height: 300px; background: radial-gradient(circle, #ffffff 0%, transparent 70%); transform: translate(30%, -30%); pointer-events: none;">
                </div>
                <div
                    class="position-relative z-1 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-4">
                    <div class="text-white">
                        <h1 class="fw-bold mb-2" id="welcomeTitle" style="font-size: 32px; letter-spacing: -0.5px;">
                            សូមស្វាគមន៍ការត្រឡប់មកវិញ</h1>
                        <p class="text-white-50 m-0 fs-6" data-i18n="dash_subtitle">
                            នេះគឺជាវឌ្ឍនភាពនៃការសិក្សារបស់អ្នកនៅថ្ងៃនេះ។</p>
                    </div>
                    <a href="courses.html" class="btn btn-light fw-bold px-4 py-3 shadow-sm btn-vibrate"
                        style="border-radius: 14px; color: var(--primary-color); font-size: 15px;">
                        <span data-i18n="explore_courses">ស្វែងរកវគ្គសិក្សា</span> <i
                            class="bi bi-arrow-right ms-2"></i>
                    </a>
                </div>
            </div>

            <!-- Stats Overview Row: Added reveal-on-scroll with delay -->
            <div class="row g-4 mb-4" id="dashboard-stats">
                <!-- Stats cards will be rendered here by JS. We will add the class in the JS rendering logic. -->
            </div>

            <div class="row g-4">
                <!-- Left Column -->
                 <div class="content-card fade-in-scale" style="animation-delay: 300ms; opacity: 0;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="card-header-title m-0" data-i18n="study_stats_title">ស្ថិតិនៃការសិក្សា</h3>
                        <select id="chartFilter"
                            class="form-select form-select-sm w-auto shadow-sm border-light-subtle fw-medium">
                            <option value="this_week" data-i18n="this_week">សប្តាហ៍នេះ</option>
                            <option value="this_month" data-i18n="this_month">ខែនេះ</option>
                            <option value="this_year" data-i18n="this_year">ឆ្នាំនេះ</option>
                        </select>
                    </div>
                    <div style="height: 300px;">
                        <canvas id="studyStatsChart"></canvas>
                    </div>
                </div>
                <div class="col-12">
                    <div class="content-card fade-in-scale mb-4" style="animation-delay: 200ms; opacity: 0;">
                        <h3 class="card-header-title" data-i18n="continue_learning_title">បន្តការសិក្សា</h3>
                        <div id="dashboard-continue-learning"></div>
                    </div>

                    <!-- Right Column -->
                    <div class="col-12">
                        <div class="content-card fade-in-scale h-100" style="animation-delay: 400ms; opacity: 0;">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h3 class="card-header-title m-0" data-i18n="next_tasks_title">កិច្ចការបន្ទាប់</h3>
                                <a href="assignments.html" class="text-primary small text-decoration-none fw-semibold"
                                    data-i18n="view_all">មើលទាំងអស់</a>
                            </div>
                            <div id="dashboard-tasks"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Public Footer Component -->
    <div id="public-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/sidebar.js"></script>

    <!-- ស្គ្រីបសម្រាប់ដំណើរការមុខងារបង្រួម Sidebar -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // វចនានុក្រមបកប្រែសម្រាប់ទំព័រ Dashboard
            const pageTranslations = {
                'km': {
                    'dash_subtitle': 'នេះគឺជាវឌ្ឍនភាពនៃការសិក្សារបស់អ្នកនៅថ្ងៃនេះ។',
                    'explore_courses': 'ស្វែងរកវគ្គសិក្សា',
                    'continue_learning_title': 'បន្តការសិក្សា',
                    'study_stats_title': 'ស្ថិតិនៃការសិក្សា',
                    'this_week': 'សប្តាហ៍នេះ', 'this_month': 'ខែនេះ', 'this_year': 'ឆ្នាំនេះ',
                    'next_tasks_title': 'កិច្ចការបន្ទាប់', 'view_all': 'មើលទាំងអស់',
                    'welcome_back': 'សូមស្វាគមន៍ការត្រឡប់មកវិញ',
                    'stat_in_progress': 'វគ្គសិក្សាកំពុងរៀន', 'stat_completed': 'វគ្គបានបញ្ចប់',
                    'stat_cert': 'វិញ្ញាបនបត្រ', 'stat_xp': 'ពិន្ទុ (XP)',
                    'next_lesson': 'មេរៀនបន្ទាប់', 'continue_course_btn': 'បន្តវគ្គសិក្សា',
                    'chart_hours': 'ម៉ោងសិក្សា', 'chart_hr': 'ម៉ោង',
                    'days': ['ច័ន្ទ', 'អង្គារ', 'ពុធ', 'ព្រហស្បតិ៍', 'សុក្រ', 'សៅរ៍', 'អាទិត្យ'],
                    'weeks': ['សប្តាហ៍១', 'សប្តាហ៍២', 'សប្តាហ៍៣', 'សប្តាហ៍៤'],
                    'months': ['មករា', 'កុម្ភៈ', 'មីនា', 'មេសា', 'ឧសភា', 'មិថុនា'],
                    'task_assignment': 'កិច្ចការ', 'task_quiz': 'កម្រងសំណួរ',
                    'due_tomorrow': 'ថ្ងៃស្អែក', 'due_in_3_days': '3 ថ្ងៃទៀត',
                    'cat_web_dev': 'ការអភិវឌ្ឍគេហទំព័រ', 'course_web_dev': 'វគ្គបណ្តុះបណ្តាលការអភិវឌ្ឍគេហទំព័រពេញលេញ 2026',
                    'lesson_intro_html': 'សេចក្តីផ្តើមនៃ HTML',
                    'task_1_title': 'បង្កើតទំព័រ HTML ដំបូង', 'task_2_title': 'មូលដ្ឋានគ្រឹះ CSS', 'course_web_dev_en': 'Web Development'
                },
                'en': {
                    'dash_subtitle': 'Here is your learning progress today.',
                    'explore_courses': 'Explore Courses',
                    'continue_learning_title': 'Continue Learning',
                    'study_stats_title': 'Study Statistics',
                    'this_week': 'This Week', 'this_month': 'This Month', 'this_year': 'This Year',
                    'next_tasks_title': 'Next Tasks', 'view_all': 'View All',
                    'welcome_back': 'Welcome back',
                    'stat_in_progress': 'Courses in Progress', 'stat_completed': 'Completed Courses',
                    'stat_cert': 'Certificates', 'stat_xp': 'Points (XP)',
                    'next_lesson': 'Next lesson', 'continue_course_btn': 'Continue Course',
                    'chart_hours': 'Study Hours', 'chart_hr': 'hours',
                    'days': ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    'weeks': ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                    'months': ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    'task_assignment': 'Assignment', 'task_quiz': 'Quiz',
                    'due_tomorrow': 'Tomorrow', 'due_in_3_days': 'In 3 days',
                    'cat_web_dev': 'Web Development', 'course_web_dev': 'The Complete 2026 Fullstack Web Developer',
                    'lesson_intro_html': 'Introduction to HTML',
                    'task_1_title': 'Create your first HTML page', 'task_2_title': 'CSS Fundamentals', 'course_web_dev_en': 'Web Development'
                }
            };

            // អនុគមន៍សម្រាប់បកប្រែទំព័រទាំងមូល
            function applyPageTranslations() {
                const lang = localStorage.getItem('language') || 'km';
                const t = pageTranslations[lang] || pageTranslations['km'];

                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (t[key]) {
                        if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) {
                            el.placeholder = t[key];
                        } else if (el.tagName === 'OPTION') {
                            el.innerText = t[key];
                        } else {
                            el.innerHTML = t[key];
                        }
                    }
                });

                // បកប្រែឈ្មោះស្វាគមន៍
                const welcomeTitle = document.getElementById('welcomeTitle');
                if (welcomeTitle) {
                    const savedFirstName = localStorage.getItem('profile_firstName') || 'John';
                    welcomeTitle.innerHTML = `${t['welcome_back']}, ${savedFirstName}! 👋`;
                }

                // បកប្រែ Chart
                const chartFilter = document.getElementById('chartFilter');
                if (chartFilter) window.updateChartData(chartFilter.value);
            }
            document.addEventListener('languageChanged', applyPageTranslations);

            // មុខងារ Render ទិន្នន័យទៅកាន់ UI
            function renderDashboard(dashboardData) {
                const statsData = dashboardData.stats;
                const continueLearningData = dashboardData.continueLearning;
                const tasksData = dashboardData.tasks;

                const statsContainer = document.getElementById("dashboard-stats");
                if (statsContainer) {
                    statsContainer.innerHTML = statsData.map((stat, index) => `
                    <div class="col-sm-6 col-xl-3">
                        <div class="stat-card stat-card-${stat.colorClass} reveal-on-scroll" style="transition-delay: ${index * 100}ms;">
                            <div class="stat-icon bg-${stat.colorClass} bg-opacity-10 text-${stat.colorClass}"><i class="bi ${stat.icon}"></i></div>
                            <div class="stat-content">
                                <h3 class="stat-counter" data-target="${stat.target}" data-suffix="${stat.suffix}">0</h3>
                                <p data-i18n="${stat.titleKey}">${stat.title}</p>
                            </div>
                        </div>
                    </div>
                `).join("");
                }

                const continueContainer = document.getElementById("dashboard-continue-learning");
                if (continueContainer) {
                    continueContainer.innerHTML = `
                    <div class="continue-course-banner" role="button" tabindex="0" aria-label="បន្តការសិក្សា" onclick="window.location.href='${continueLearningData.link}'">
                        <div class="banner-content flex-grow-1">
                            <span class="badge bg-white text-primary mb-2" data-i18n="${continueLearningData.categoryKey}">${continueLearningData.category}</span>
                            <h4 data-i18n="${continueLearningData.courseTitleKey}">${continueLearningData.courseTitle}</h4>
                            <p><span data-i18n="next_lesson">មេរៀនបន្ទាប់</span>: <span data-i18n="${continueLearningData.nextLessonKey}">${continueLearningData.nextLesson}</span></p>
                            <div class="d-flex align-items-center gap-3">
                                <div class="progress-light flex-grow-1" style="max-width: 250px;">
                                    <div class="progress-bar" style="width: 0%;" data-target-width="${continueLearningData.progress}%"></div>
                                </div>
                                <span class="small fw-semibold continue-course-progress-text" data-target="${continueLearningData.progress}">0%</span>
                            </div>
                        </div>
                        <div class="banner-btn-wrapper">
                            <a href="${continueLearningData.link}" class="btn btn-light fw-bold text-primary px-4 py-3" style="border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.3s;" onclick="event.stopPropagation();"><span data-i18n="continue_course_btn">បន្តវគ្គសិក្សា</span> <i class="bi bi-play-circle-fill ms-1"></i></a>
                        </div>
                    </div>
                `;
                }

                const tasksContainer = document.getElementById("dashboard-tasks");
                if (tasksContainer) {
                    if (!tasksData || tasksData.length === 0) {
                        const lang = localStorage.getItem('language') || 'km';
                        const t = pageTranslations[lang] || pageTranslations['km'];
                        tasksContainer.innerHTML = `
                            <div class="text-center py-4 fade-in-scale">
                                <img src="https://cdn3d.iconscout.com/3d/premium/thumb/trophy-5342746-4468818.png" alt="All Caught Up" style="width: 130px; margin-bottom: 20px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));">
                                <h5 class="fw-bold text-dark mb-2" data-i18n="no_tasks_title">${t['no_tasks_title']}</h5>
                                <p class="text-muted small mb-0" data-i18n="no_tasks_desc">${t['no_tasks_desc']}</p>
                            </div>
                        `;
                    } else {
                        tasksContainer.innerHTML = tasksData.map(task => {
                            const targetUrl = task.typeKey === 'task_quiz' ? 'quizzes.html' : 'assignments.html';
                            return `
                        <div class="task-list-item" role="button" tabindex="0" onclick="window.location.href='${targetUrl}'">
                            <div class="d-flex align-items-center gap-3">
                                <div class="task-icon bg-${task.colorClass} bg-opacity-10 text-${task.colorClass}"><i class="bi ${task.icon}"></i></div>
                                <div>
                                    <h6 class="fw-bold m-0" style="font-size: 14px;"><span data-i18n="${task.typeKey}">${task.type}</span>: <span data-i18n="${task.titleKey}">${task.title}</span></h6>
                                    <small class="text-muted" style="font-size: 12px;" data-i18n="${task.courseKey}">${task.course}</small>
                                </div>
                            </div>
                            <div class="text-end">
                                <span class="badge bg-${task.colorClass} bg-opacity-10 text-${task.colorClass} rounded-pill" data-i18n="${task.dueKey}">${task.due}</span>
                            </div>
                        </div>
                    `}).join("");
                    }
                }

                initAnimations(); // ចាប់ផ្តើមចលនារាប់លេខ
                initializeScrollObserver(); // ចាប់ផ្តើមត្រួតពិនិត្យការ Scroll សម្រាប់ធាតុថ្មីៗ
            }

            // មុខងារសម្រាប់ឲ្យលេខទិន្នន័យលោតអាប់ដេតដោយស្វ័យប្រវត្តិ
            function initAnimations() {
                const counters = document.querySelectorAll('.stat-counter');
                counters.forEach(counter => {
                    const target = parseInt(counter.getAttribute('data-target'));
                    const suffix = counter.getAttribute('data-suffix') || '';
                    const duration = 1500; // រយៈពេលលោតសរុប (1.5 វិនាទី)
                    const step = target / (duration / 16); // ប្រើ 60fps (1 Frame = 16ms)
                    let current = 0;

                    const updateCounter = () => {
                        current += step;
                        if (current < target) {
                            counter.innerText = Math.ceil(current) + suffix;
                            requestAnimationFrame(updateCounter);
                        } else {
                            counter.innerText = target + suffix;
                        }
                    };

                    updateCounter();
                });

                // មុខងារសម្រាប់ឲ្យលេខភាគរយវគ្គសិក្សាកំពុងរៀនលោត
                const progressTexts = document.querySelectorAll('.continue-course-progress-text');
                progressTexts.forEach(text => {
                    const target = parseInt(text.getAttribute('data-target'));
                    const duration = 1200; // រយៈពេលលោតសរុប (1.2 វិនាទី)
                    const step = target / (duration / 16);
                    let current = 0;

                    const updateCounter = () => {
                        current += step;
                        if (current < target) {
                            text.innerText = Math.ceil(current) + '%';
                            requestAnimationFrame(updateCounter);
                        } else {
                            text.innerText = target + '%';
                        }
                    };
                    updateCounter();
                });

                // មុខងារសម្រាប់ឲ្យ Progress Bar រត់តាមភាគរយ
                const progressBars = document.querySelectorAll('.progress-bar');
                progressBars.forEach(bar => {
                    const targetWidth = bar.getAttribute('data-target-width') || bar.style.width;
                    bar.style.transition = 'width 1.2s ease-in-out';
                    setTimeout(() => {
                        bar.style.width = targetWidth;
                    }, 150);
                });
            }

            // ៣. គូរក្រាហ្វិក (Chart.js)
            const ctx = document.getElementById('studyStatsChart');
            if (ctx) {
                const isDark = document.body.classList.contains('dark-mode');
                const gridColor = isDark ? '#334155' : '#f1f5f9';
                const textColor = isDark ? '#94a3b8' : '#64748b';
                const pointBgColor = isDark ? '#1e293b' : '#ffffff';
                const lineColor = isDark ? '#3b82f6' : '#2563eb';

                const gradientFill = ctx.getContext('2d').createLinearGradient(0, 0, 0, 300);
                gradientFill.addColorStop(0, isDark ? 'rgba(59, 130, 246, 0.4)' : 'rgba(37, 99, 235, 0.25)');
                gradientFill.addColorStop(1, isDark ? 'rgba(59, 130, 246, 0.05)' : 'rgba(37, 99, 235, 0)');

                window.studyChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['ច័ន្ទ', 'អង្គារ', 'ពុធ', 'ព្រហស្បតិ៍', 'សុក្រ', 'សៅរ៍', 'អាទិត្យ'],
                        datasets: [{
                            label: 'ម៉ោងសិក្សា',
                            data: [1.5, 2, 0.5, 3, 1, 4, 2.5],
                            borderColor: lineColor,
                            backgroundColor: gradientFill,
                            borderWidth: 4,
                            fill: true,
                            tension: 0.45,
                            pointBackgroundColor: pointBgColor,
                            pointBorderColor: lineColor,
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animations: {
                            x: {
                                duration: 1500,
                                easing: 'easeOutQuart',
                                from: 0
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                padding: 12,
                                backgroundColor: isDark ? '#0f172a' : '#1e293b',
                                titleFont: { family: 'Kantumruy Pro', size: 13 },
                                bodyFont: { family: 'Kantumruy Pro', size: 14, weight: 'bold' },
                                callbacks: {
                                    label: function (context) {
                                        const lang = localStorage.getItem('language') || 'km';
                                        const t = pageTranslations[lang] || pageTranslations['km'];
                                        return context.parsed.y + ' ' + (t['chart_hr'] || 'ម៉ោង');
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: gridColor, drawBorder: false },
                                ticks: { stepSize: 1, color: textColor, font: { family: 'Kantumruy Pro' } }
                            },
                            x: {
                                grid: { display: false, drawBorder: false },
                                ticks: { color: textColor, font: { family: 'Kantumruy Pro' } }
                            }
                        }
                    },
                    plugins: [{
                        id: 'glowLine',
                        beforeDatasetDraw: (chart) => {
                            const ctx = chart.ctx;
                            ctx.save();
                            ctx.shadowColor = chart.data.datasets[0].borderColor; // យកពណ៌ដូចខ្សែបន្ទាត់
                            ctx.shadowBlur = 12; // កម្រិតភាពសាយនៃពន្លឺ
                            ctx.shadowOffsetX = 0;
                            ctx.shadowOffsetY = 4; // ទម្លាក់ពន្លឺចុះក្រោមបន្តិច ដើម្បីឲ្យមើលទៅផុស
                        },
                        afterDatasetDraw: (chart) => {
                            chart.ctx.restore();
                        }
                    }]
                });

                // ៤. ធ្វើបច្ចុប្បន្នភាពពណ៌ក្រាហ្វិកពេលប្តូរ Dark Mode
                document.addEventListener('themeChanged', function (e) {
                    if (window.studyChart) {
                        const isDark = e.detail.isDark;
                        const newGridColor = isDark ? '#334155' : '#f1f5f9';
                        const newTextColor = isDark ? '#94a3b8' : '#64748b';
                        const newPointBgColor = isDark ? '#1e293b' : '#ffffff';
                        const newLineColor = isDark ? '#3b82f6' : '#2563eb';

                        const newGradientFill = ctx.getContext('2d').createLinearGradient(0, 0, 0, 300);
                        newGradientFill.addColorStop(0, isDark ? 'rgba(59, 130, 246, 0.4)' : 'rgba(37, 99, 235, 0.25)');
                        newGradientFill.addColorStop(1, isDark ? 'rgba(59, 130, 246, 0.05)' : 'rgba(37, 99, 235, 0)');

                        window.studyChart.options.scales.y.grid.color = newGridColor;
                        window.studyChart.options.scales.x.ticks.color = newTextColor;
                        window.studyChart.options.scales.y.ticks.color = newTextColor;
                        window.studyChart.data.datasets[0].pointBackgroundColor = newPointBgColor;
                        window.studyChart.data.datasets[0].borderColor = newLineColor;
                        window.studyChart.data.datasets[0].pointBorderColor = newLineColor;
                        window.studyChart.data.datasets[0].backgroundColor = newGradientFill;
                        window.studyChart.options.plugins.tooltip.backgroundColor = isDark ? '#0f172a' : '#1e293b';
                        window.studyChart.update();
                    }
                });

                // ៥. មុខងារផ្លាស់ប្តូរទិន្នន័យក្រាហ្វិកតាមជម្រើសពេលវេលា
                window.updateChartData = function (filterValue) {
                    const lang = localStorage.getItem('language') || 'km';
                    const t = pageTranslations[lang] || pageTranslations['km'];
                    if (window.studyChart) {
                        window.studyChart.data.datasets[0].label = t['chart_hours'];
                        if (filterValue === 'this_week') {
                            window.studyChart.data.labels = t['days'];
                            window.studyChart.data.datasets[0].data = [1.5, 2, 0.5, 3, 1, 4, 2.5];
                        } else if (filterValue === 'this_month') {
                            window.studyChart.data.labels = t['weeks'];
                            window.studyChart.data.datasets[0].data = [12, 18, 10, 15];
                        } else if (filterValue === 'this_year') {
                            window.studyChart.data.labels = t['months'];
                            window.studyChart.data.datasets[0].data = [45, 50, 40, 60, 70, 65];
                        }
                        window.studyChart.update();
                    }
                };

                const chartFilter = document.getElementById('chartFilter');
                if (chartFilter) {
                    chartFilter.addEventListener('change', function () {
                        window.updateChartData(this.value);
                    });
                }
            }

            // ទាញយកទិន្នន័យពី JSON
            async function initializePage() {
                try {
                    // អានទិន្នន័យពី LocalStorage ជាមុនសិន
                    const localDashboard = localStorage.getItem('dashboard_db');
                    let dashboardData;

                    if (localDashboard) {
                        dashboardData = JSON.parse(localDashboard);
                    } else {
                        // ទិន្នន័យបម្រុង (Fallback Data) ក្នុងករណីមិនទាន់មានទិន្នន័យក្នុង LocalStorage
                        dashboardData = {
                            stats: [
                                { colorClass: "primary", icon: "bi-journal-bookmark-fill", target: 4, suffix: "", title: "វគ្គសិក្សាកំពុងរៀន", titleKey: "stat_in_progress" },
                                { colorClass: "success", icon: "bi-patch-check-fill", target: 12, suffix: "", title: "វគ្គបានបញ្ចប់", titleKey: "stat_completed" },
                                { colorClass: "warning", icon: "bi-award-fill", target: 5, suffix: "", title: "វិញ្ញាបនបត្រ", titleKey: "stat_cert" },
                                { colorClass: "info", icon: "bi-star-fill", target: 850, suffix: "", title: "ពិន្ទុ (XP)", titleKey: "stat_xp" }
                            ],
                            continueLearning: {
                                category: "ការអភិវឌ្ឍគេហទំព័រ", categoryKey: "cat_web_dev",
                                courseTitle: "វគ្គបណ្តុះបណ្តាលការអភិវឌ្ឍគេហទំព័រពេញលេញ 2026", courseTitleKey: "course_web_dev",
                                nextLesson: "សេចក្តីផ្តើមនៃ HTML", nextLessonKey: "lesson_intro_html",
                                progress: 22,
                                link: "learning.html"
                            },
                            tasks: [
                                { colorClass: "danger", icon: "bi-exclamation-triangle-fill", type: "កិច្ចការ", typeKey: "task_assignment", title: "បង្កើតទំព័រ HTML ដំបូង", titleKey: "task_1_title", course: "Web Development", courseKey: "course_web_dev_en", due: "ថ្ងៃស្អែក", dueKey: "due_tomorrow" },
                                { colorClass: "warning", icon: "bi-journal-text", type: "កម្រងសំណួរ", typeKey: "task_quiz", title: "មូលដ្ឋានគ្រឹះ CSS", titleKey: "task_2_title", course: "Web Development", courseKey: "course_web_dev_en", due: "3 ថ្ងៃទៀត", dueKey: "due_in_3_days" }
                            ]
                        };
                    }

                    renderDashboard(dashboardData);
                    applyPageTranslations();
                } catch (error) {
                    console.error('Failed to load dashboard data:', error);
                }
            }

            // បង្ហាញ Alert ស្វាគមន៍បន្ទាប់ពីចុះឈ្មោះរួច
            function checkWelcomeAlert() {
                if (localStorage.getItem('showRegisterWelcome') === 'true') {
                    localStorage.removeItem('showRegisterWelcome');

                    if (typeof Swal !== 'undefined') {
                        Swal.fire({
                            icon: 'success',
                            title: 'សូមស្វាគមន៍មកកាន់ Smart Learn!',
                            text: 'ការចុះឈ្មោះបង្កើតគណនីរបស់អ្នកទទួលបានជោគជ័យ។',
                            confirmButtonColor: '#2563eb'
                        });
                    }
                }
            }
            initializePage();
            checkWelcomeAlert();
        });
    </script>
