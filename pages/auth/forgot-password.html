<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Learn - ភ្លេចពាក្យសម្ងាត់</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link href="../../assets/css/style.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Kantumruy Pro', 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }
        .auth-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 15px;
        }
        .auth-card {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.04);
            border: 1px solid #f1f5f9;
            margin: 0 auto;
            transition: all 0.3s ease;
        }
        body.dark-mode {
            background-color: #0f172a !important;
        }
        body.dark-mode .auth-card {
            background: #1e293b !important;
            border-color: #334155 !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2) !important;
        }
        
        /* Style បន្ថែមសម្រាប់ផ្ទាំង SweetAlert2 ឱ្យត្រូវនឹង Kantumruy Pro */
        .swal2-popup {
            font-family: 'Kantumruy Pro', sans-serif !important;
        }
    </style>
</head>
<body>
    <button class="btn btn-light position-fixed top-0 end-0 m-4 shadow-sm border border-light-subtle" id="authThemeToggle" style="border-radius: 50%; width: 45px; height: 45px; z-index: 1000;">
        <i class="bi bi-moon-stars-fill"></i>
    </button>

    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 70px; height: 70px; background-color: rgba(33, 100, 119, 0.1); color: #216477;">
                    <i class="bi bi-key" style="font-size: 32px;"></i>
                </div>
                <h4 class="fw-bold mb-1" data-i18n="forgot_pwd_title">តើអ្នកភ្លេចពាក្យសម្ងាត់មែនទេ?</h4>
                <p class="text-muted small" data-i18n="forgot_pwd_desc">សូមបញ្ចូលអាសយដ្ឋានអ៊ីមែលរបស់អ្នកខាងក្រោម ហើយយើងនឹងផ្ញើតំណភ្ជាប់សម្រាប់កំណត់ពាក្យសម្ងាត់ឡើងវិញទៅកាន់អ្នក។</p>
            </div>

            <form id="forgotPasswordForm" novalidate>
                <div class="mb-4">
                    <label class="form-label small fw-semibold" data-i18n="email_label">អាសយដ្ឋានអ៊ីមែល</label>
                    <input type="email" id="forgotEmail" class="form-control" placeholder="បញ្ចូលអ៊ីមែលរបស់អ្នក" data-i18n="email_ph" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mb-3 fw-semibold" id="resetBtn" data-i18n="btn_send_link">ផ្ញើតំណភ្ជាប់កំណត់ឡើងវិញ</button>
            </form>

            <div class="text-center mt-4">
                <a href="login.html" class="text-muted small text-decoration-none fw-semibold"><i class="bi bi-arrow-left me-1"></i> <span data-i18n="back_to_login">ត្រឡប់ទៅទំព័រចូលគណនីវិញ</span></a>
            </div>
        </div>
    </div>

    <script src="../../assets/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // វចនានុក្រមបកប្រែ
            const pageTranslations = {
                'km': {
                    'forgot_pwd_title': 'តើអ្នកភ្លេចពាក្យសម្ងាត់មែនទេ?',
                    'forgot_pwd_desc': 'សូមបញ្ចូលអាសយដ្ឋានអ៊ីមែលរបស់អ្នកខាងក្រោម ហើយយើងនឹងផ្ញើតំណភ្ជាប់សម្រាប់កំណត់ពាក្យសម្ងាត់ឡើងវិញទៅកាន់អ្នក។',
                    'email_label': 'អាសយដ្ឋានអ៊ីមែល', 'email_ph': 'បញ្ចូលអ៊ីមែលរបស់អ្នក',
                    'btn_send_link': 'ផ្ញើតំណភ្ជាប់កំណត់ឡើងវិញ', 'back_to_login': 'ត្រឡប់ទៅទំព័រចូលគណនីវិញ',
                    'processing': 'កំពុងដំណើរការ...', 'success_title': 'បានផ្ញើជោគជ័យ',
                    'success_desc': 'តំណភ្ជាប់សម្រាប់កំណត់ពាក្យសម្ងាត់ថ្មីត្រូវបានផ្ញើទៅកាន់អ៊ីមែលរបស់អ្នក!<br><br><a href="reset-password.html" class="btn btn-primary btn-sm mt-2">ចុចទីនេះដើម្បីបន្ត (Demo)</a>'
                },
                'en': {
                    'forgot_pwd_title': 'Forgot your password?',
                    'forgot_pwd_desc': 'Please enter your email address below and we will send you a link to reset your password.',
                    'email_label': 'Email Address', 'email_ph': 'Enter your email',
                    'btn_send_link': 'Send Reset Link', 'back_to_login': 'Back to login',
                    'processing': 'Processing...', 'success_title': 'Successfully Sent',
                    'success_desc': 'A link to reset your password has been sent to your email!<br><br><a href="reset-password.html" class="btn btn-primary btn-sm mt-2">Click here to continue (Demo)</a>'
                }
            };

            function applyPageTranslations() {
                const lang = localStorage.getItem('language') || 'km';
                const t = pageTranslations[lang] || pageTranslations['km'];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (t[key]) {
                        if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) el.placeholder = t[key];
                        else el.innerHTML = t[key];
                    }
                });
            }
            document.addEventListener('languageChanged', applyPageTranslations);
            applyPageTranslations();

            // មុខងារប្តូរ Dark Mode
            const authThemeToggle = document.getElementById('authThemeToggle');
            if (authThemeToggle) {
                if (document.body.classList.contains('dark-mode')) authThemeToggle.querySelector('i').className = 'bi bi-sun-fill text-warning';
                authThemeToggle.addEventListener('click', function() {
                    if (window.toggleTheme) window.toggleTheme();
                    const isDark = document.body.classList.contains('dark-mode');
                    this.querySelector('i').className = isDark ? 'bi bi-sun-fill text-warning' : 'bi bi-moon-stars-fill';
                });
            }

            const form = document.getElementById('forgotPasswordForm');
            const btn = document.getElementById('resetBtn');

            // កែសម្រួលលក្ខខណ្ឌត្រង់នេះ (លុប successMsg ចេញ ដើម្បីកុំឱ្យស្ទះកូដ)
            if (form && btn) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    // ពិនិត្យភាពត្រឹមត្រូវនៃ Form (HTML5 Validation)
                    if (!form.checkValidity()) {
                        form.classList.add('was-validated');
                        return;
                    }
                    
                    const lang = localStorage.getItem('language') || 'km';
                    const t = pageTranslations[lang] || pageTranslations['km'];
                    
                    const originalText = btn.innerHTML;
                    btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> ${t['processing']}`;
                    btn.disabled = true;

                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                        form.reset();
                        form.classList.remove('was-validated');
                        
                        // បង្ហាញផ្ទាំងជោគជ័យដោយប្រើប្រាស់ SweetAlert2
                        Swal.fire({
                            icon: 'success',
                            title: t['success_title'],
                            html: t['success_desc'],
                            showConfirmButton: false,
                            allowOutsideClick: false
                        });
                    }, 1500);
                });
            }
        });
    </script>
</body>
</html>
