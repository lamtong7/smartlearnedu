<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Learn - ចូលគណនី</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <link href="../../assets/css/style.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Kantumruy Pro', 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 15px;
            transition: background-color 0.3s ease;
        }
        body.dark-mode {
            background-color: #0f172a !important;
        }
        .auth-card {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.04);
            border: 1px solid #f1f5f9;
            margin: 0 auto;
            transition: all 0.3s ease;
        }
        body.dark-mode .auth-card {
            background: #1e293b !important;
            border-color: #334155 !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2) !important;
        }
        .brand-logo {
            font-weight: 800;
            font-size: 24px;
            color: var(--text-dark);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
        }
        /* Animation សម្រាប់សញ្ញាខ្វៀកលោតភ្លឹបភ្លែត (Blinking Cursor) */
        @keyframes blink-cursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .typing-cursor {
            animation: blink-cursor 1s step-end infinite;
            color: #216477;
        }
        
        .password-strength-meter { transition: all 0.3s ease; }
        .strength-bar { transition: all 0.3s ease; }
    </style>
</head>
<body>
    <button class="btn btn-light position-fixed top-0 end-0 m-4 shadow-sm border border-light-subtle" id="authThemeToggle" style="border-radius: 50%; width: 45px; height: 45px; z-index: 1000;">
        <i class="bi bi-moon-stars-fill"></i>
    </button>

    <div class="auth-card">
        <div class="text-center">
            <a href="../../index.html" class="brand-logo text-decoration-none fw-bold" style="color: #216477;"><i class="bi bi-mortarboard-fill text-primary"></i> Smart Learn</a>
            <h4 class="fw-bold mb-1"><span id="typingEffectLogin"></span><span class="typing-cursor">|</span></h4>
            <p class="text-muted small mb-4" data-i18n="login_desc">សូមបញ្ចូលព័ត៌មានលម្អិតរបស់អ្នកដើម្បីចូលគណនី។</p>
        </div>

        <form id="loginForm" novalidate>
            <div class="mb-3">
                <label class="form-label small fw-semibold" data-i18n="email_label">អាសយដ្ឋានអ៊ីមែល</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="បញ្ចូលអ៊ីមែលរបស់អ្នក" data-i18n="email_ph" required>
            </div>
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label small fw-semibold m-0" data-i18n="pwd_label">ពាក្យសម្ងាត់</label>
                    <a href="forgot-password.html" class="text-primary text-decoration-none small fw-semibold" data-i18n="forgot_pwd">ភ្លេចពាក្យសម្ងាត់?</a>
                </div>
                <div class="position-relative d-flex align-items-center">
                    <input type="password" class="form-control pe-5" id="loginPassword" placeholder="បញ្ចូលពាក្យសម្ងាត់របស់អ្នក" data-i18n="pwd_ph" required>
                    <span class="position-absolute end-0 me-3 text-muted toggle-password" id="togglePassword" style="cursor: pointer; z-index: 10;">
                        <i class="bi bi-eye-slash"></i>
                    </span>
                </div>
                <div class="password-strength-meter mt-2 d-none" id="passwordStrengthContainer">
                    <div class="d-flex gap-1 mb-1">
                        <div class="strength-bar flex-grow-1 bg-light rounded-pill" style="height: 4px;" id="bar1"></div>
                        <div class="strength-bar flex-grow-1 bg-light rounded-pill" style="height: 4px;" id="bar2"></div>
                        <div class="strength-bar flex-grow-1 bg-light rounded-pill" style="height: 4px;" id="bar3"></div>
                        <div class="strength-bar flex-grow-1 bg-light rounded-pill" style="height: 4px;" id="bar4"></div>
                    </div>
                    <div class="small text-muted fw-semibold" style="font-size: 11px;" id="strengthText" data-i18n="pwd_weak">ពាក្យសម្ងាត់ខ្សោយ</div>
                </div>
            </div>
            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label small text-muted" for="rememberMe" data-i18n="remember_me">ចងចាំខ្ញុំ</label>
            </div>
            
            <div id="loginError" class="alert alert-danger d-none small py-2 mb-3 text-start"></div>
            <button type="submit" id="loginBtn" class="btn btn-primary w-100 py-2 mb-3 fw-semibold" data-i18n="btn_login">ចូលគណនី</button>
        </form>

        <div class="position-relative my-4 text-center">
            <hr class="border-secondary opacity-10">
            <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 small text-muted fw-semibold" data-i18n="or_continue_with">ឬបន្តជាមួយ</span>
        </div>
        
        <div class="row g-2 mb-3">
            <div class="col-12">
                <button type="button" id="googleLoginBtn" class="btn btn-light w-100 py-2 fw-semibold border bg-white shadow-sm" style="border-radius: 8px;">
                    <i class="bi bi-google text-danger me-2"></i> <span data-i18n="btn_google_login">ចូលគណនីជាមួយ Google</span>
                </button>
            </div>
        </div>

        <p class="text-center small text-muted mt-4 mb-0"><span data-i18n="no_account">មិនទាន់មានគណនីមែនទេ?</span> <a href="register.html" class="text-primary fw-semibold text-decoration-none" data-i18n="register">ចុះឈ្មោះ</a></p>
        <div class="text-center mt-3"><a href="../../index.html" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left"></i> <span data-i18n="back_home">ត្រឡប់ទៅទំព័រដើម</span></a></div>
    </div>

    <script src="../../assets/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // វចនានុក្រមបកប្រែ
            const pageTranslations = {
                'km': {
                    'login_title': 'សូមស្វាគមន៍ការត្រឡប់មកវិញ', 'login_desc': 'សូមបញ្ចូលព័ត៌មានលម្អិតរបស់អ្នកដើម្បីចូលគណនី។',
                    'email_label': 'អាសយដ្ឋានអ៊ីមែល', 'email_ph': 'បញ្ចូលអ៊ីមែលរបស់អ្នក',
                    'pwd_label': 'ពាក្យសម្ងាត់', 'forgot_pwd': 'ភ្លេចពាក្យសម្ងាត់?', 'pwd_ph': 'បញ្ចូលពាក្យសម្ងាត់របស់អ្នក',
                    'remember_me': 'ចងចាំខ្ញុំ', 'btn_login': 'ចូលគណនី', 'or_continue_with': 'ឬបន្តជាមួយ',
                    'btn_google_login': 'ចូលគណនីជាមួយ Google', 'no_account': 'មិនទាន់មានគណនីមែនទេ?', 'register': 'ចុះឈ្មោះ', 'back_home': 'ត្រឡប់ទៅទំព័រដើម',
                    'login_loading': 'កំពុងចូល...', 'return_home': 'កំពុងត្រឡប់ទៅទំព័រដើមវិញ...', 'login_error': 'អ៊ីមែល ឬពាក្យសម្ងាត់មិនត្រឹមត្រូវទេ។',
                    'pwd_weak': 'ពាក្យសម្ងាត់ខ្សោយ', 'pwd_medium': 'ពាក្យសម្ងាត់មធ្យម', 'pwd_strong': 'ពាក្យសម្ងាត់រឹងមាំ'
                },
                'en': {
                    'login_title': 'Welcome Back', 'login_desc': 'Please enter your details to sign in.',
                    'email_label': 'Email Address', 'email_ph': 'Enter your email',
                    'pwd_label': 'Password', 'forgot_pwd': 'Forgot password?', 'pwd_ph': 'Enter your password',
                    'remember_me': 'Remember me', 'btn_login': 'Sign In', 'or_continue_with': 'Or continue with',
                    'btn_google_login': 'Sign in with Google', 'no_account': 'Don\'t have an account?', 'register': 'Sign Up', 'back_home': 'Back to Home',
                    'login_loading': 'Signing in...', 'return_home': 'Returning to home...', 'login_error': 'Invalid email or password.',
                    'pwd_weak': 'Weak Password', 'pwd_medium': 'Medium Password', 'pwd_strong': 'Strong Password'
                }
            };

            function applyPageTranslations() {
                const lang = localStorage.getItem('language') || 'km';
                const t = pageTranslations[lang] || pageTranslations['km'];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (t[key]) {
                        if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) el.placeholder = t[key];
                        else el.innerHTML = t[key];
                    }
                });
                
                const textLogin = t['login_title'];
                const typingElementLogin = document.getElementById('typingEffectLogin');
                if (window.loginTypingTimeout) clearTimeout(window.loginTypingTimeout);
                
                if (typingElementLogin) {
                    typingElementLogin.innerHTML = '';
                    let indexLogin = 0;
                    function typeWriterLogin() {
                        if (indexLogin < textLogin.length) {
                            typingElementLogin.innerHTML += textLogin.charAt(indexLogin);
                            indexLogin++;
                            window.loginTypingTimeout = setTimeout(typeWriterLogin, 100);
                        }
                    }
                    typeWriterLogin();
                }
            }
            document.addEventListener('languageChanged', applyPageTranslations);
            applyPageTranslations();

            // មុខងារប្តូរ Dark Mode
            const authThemeToggle = document.getElementById('authThemeToggle');
            if (authThemeToggle) {
                if (document.body.classList.contains('dark-mode')) authThemeToggle.querySelector('i').className = 'bi bi-sun-fill text-warning';
                authThemeToggle.addEventListener('click', function() {
                    if (window.toggleTheme) window.toggleTheme();
                    const isDark = document.body.classList.contains('dark-mode');
                    this.querySelector('i').className = isDark ? 'bi bi-sun-fill text-warning' : 'bi bi-moon-stars-fill';
                });
            }

            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('loginPassword');
            
            // 🔥 កែសម្រួលមុខងារចុចរូបភ្នែកបិទ/បើកឱ្យដំណើរការបានត្រឹមត្រូវ
            if (togglePassword && passwordInput) {
                togglePassword.addEventListener('click', function() {
                    const icon = this.querySelector('i');
                    if (passwordInput.getAttribute('type') === 'password') {
                        passwordInput.setAttribute('type', 'text');
                        icon.className = 'bi bi-eye';
                    } else {
                        passwordInput.setAttribute('type', 'password');
                        icon.className = 'bi bi-eye-slash';
                    }
                });
            }
            
            // --- មុខងារ Password Strength ---
            const strengthContainer = document.getElementById('passwordStrengthContainer');
            const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
            const strengthText = document.getElementById('strengthText');

            if (passwordInput && strengthContainer) {
                passwordInput.addEventListener('input', function() {
                    const val = this.value;
                    const lang = localStorage.getItem('language') || 'km';
                    const t = pageTranslations[lang] || pageTranslations['km'];

                    if (val.length > 0) {
                        strengthContainer.classList.remove('d-none');
                    } else {
                        strengthContainer.classList.add('d-none');
                        return;
                    }

                    let strength = 0;
                    if (val.length >= 8) strength += 1;
                    if (val.match(/[a-z]/) && val.match(/[A-Z]/)) strength += 1;
                    if (val.match(/\d/)) strength += 1;
                    if (val.match(/[^a-zA-Z\d]/)) strength += 1;

                    bars.forEach(bar => bar.className = 'strength-bar flex-grow-1 bg-light rounded-pill');

                    if (strength <= 1) {
                        bars[0].className = 'strength-bar flex-grow-1 bg-danger rounded-pill';
                        if (strength === 1) bars[1].className = 'strength-bar flex-grow-1 bg-danger rounded-pill';
                        strengthText.textContent = t['pwd_weak'];
                        strengthText.className = 'small fw-semibold text-danger';
                    } else if (strength === 2 || strength === 3) {
                        bars[0].className = 'strength-bar flex-grow-1 bg-warning rounded-pill';
                        bars[1].className = 'strength-bar flex-grow-1 bg-warning rounded-pill';
                        bars[2].className = 'strength-bar flex-grow-1 bg-warning rounded-pill';
                        strengthText.textContent = t['pwd_medium'];
                        strengthText.className = 'small fw-semibold text-warning';
                    } else if (strength >= 4) {
                        bars.forEach(bar => bar.className = 'strength-bar flex-grow-1 bg-success rounded-pill');
                        strengthText.textContent = t['pwd_strong'];
                        strengthText.className = 'small fw-semibold text-success';
                    }
                });
            }

            // មុខងារសម្រាប់ត្រួតពិនិត្យ និងបញ្ជូនទិន្នន័យ
            const loginForm = document.getElementById('loginForm');
            const loginEmail = document.getElementById('loginEmail');
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            const rememberMeCheckbox = document.getElementById('rememberMe');

            // ទាញយក "ចងចាំខ្ញុំ"
            const rememberedEmail = localStorage.getItem('rememberedEmail');
            if (rememberedEmail && loginEmail && rememberMeCheckbox) {
                loginEmail.value = rememberedEmail;
                rememberMeCheckbox.checked = true;
                if (passwordInput) {
                    passwordInput.focus();
                }
            }

            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const email = loginEmail.value.trim();
                    const password = passwordInput.value;
                    
                    const redirectUrlTarget = sessionStorage.getItem('redirectUrl');
                    const lang = localStorage.getItem('language') || 'km';
                    const t = pageTranslations[lang] || pageTranslations['km'];
                    const loadingText = redirectUrlTarget ? t['return_home'] : t['login_loading'];

                    const originalText = loginBtn.innerHTML;
                    loginBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> ${loadingText}`;
                    loginBtn.disabled = true;
                    if (loginError) loginError.classList.add('d-none');
                    
                    setTimeout(() => {
                        loginBtn.innerHTML = originalText;
                        loginBtn.disabled = false;
                        
                        const users = JSON.parse(localStorage.getItem('smartlearn_users') || '[]');
                        const hashedInputPassword = CryptoJS.SHA256(password).toString();
                        const foundUser = users.find(u => u.email === email && u.password === hashedInputPassword);
                        
                        if (foundUser) {
                            localStorage.setItem('profile_firstName', foundUser.firstName);
                            localStorage.setItem('profile_lastName', foundUser.lastName);
                            localStorage.setItem('profile_email', foundUser.email);
                            localStorage.setItem('isLoggedIn', 'true');
                            localStorage.setItem('showLoginToast', 'true');
                            
                            if (rememberMeCheckbox && rememberMeCheckbox.checked) {
                                localStorage.setItem('rememberedEmail', email);
                            } else {
                                localStorage.removeItem('rememberedEmail');
                            }
                            
                            const redirectUrl = sessionStorage.getItem('redirectUrl') || '../dashboard.html';
                            sessionStorage.removeItem('redirectUrl');
                            window.location.href = redirectUrl;
                        } else {
                            if (loginError) {
                                loginError.innerHTML = `<i class="bi bi-exclamation-circle-fill me-1"></i> ${t['login_error']}`;
                                loginError.classList.remove('d-none');
                            }
                        }
                    }, 1000);
                });
            }

            // មុខងារ Login ជាមួយ Google ដោយប្រើប្រាស់ Firebase
            const googleLoginBtn = document.getElementById('googleLoginBtn');
            if (googleLoginBtn) {
                googleLoginBtn.addEventListener('click', async function() {
                    try {
                        const redirectUrlTarget = sessionStorage.getItem('redirectUrl');
                        const loadingText = redirectUrlTarget ? 'កំពុងត្រឡប់ទៅទំព័រដើមវិញ...' : 'កំពុងភ្ជាប់...';
                        this.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> ${loadingText}`;
                        this.disabled = true;

                        const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js');
                        const { getAuth, signInWithPopup, GoogleAuthProvider } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');

                        const firebaseConfig = {
                            apiKey: "YOUR_API_KEY",
                            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
                            projectId: "YOUR_PROJECT_ID"
                        };

                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const provider = new GoogleAuthProvider();

                        const result = await signInWithPopup(auth, provider);
                        const user = result.user;

                        const names = user.displayName ? user.displayName.split(' ') : ['Google', 'User'];
                        localStorage.setItem('profile_firstName', names[0]);
                        localStorage.setItem('profile_lastName', names.slice(1).join(' ') || '');
                        localStorage.setItem('profile_email', user.email);
                        localStorage.setItem('profile_image', user.photoURL || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100');
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('showLoginToast', 'true');
                        
                        const redirectUrl = sessionStorage.getItem('redirectUrl') || '../dashboard.html';
                        sessionStorage.removeItem('redirectUrl');
                        window.location.href = redirectUrl;
                    } catch (error) {
                        console.error("Firebase Auth Error:", error);
                        if (typeof Swal !== 'undefined') Swal.fire('បញ្ហា', 'ការចូលគណនីជាមួយ Google ទទួលបរាជ័យ។', 'error');
                        this.innerHTML = '<i class="bi bi-google text-danger me-2"></i> ចូលគណនីជាមួយ Google';
                        this.disabled = false;
                    }
                });
            }
        });
    </script>
</body>
</html>
