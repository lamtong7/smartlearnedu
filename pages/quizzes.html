<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Learn - កម្រងសំណួរ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        .quiz-tabs {
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 1px;
            margin-bottom: 24px;
            overflow-x: auto;
        }
        .quiz-tab-btn {
            background: transparent;
            border: none;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
            position: relative;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .quiz-tab-btn.active { color: var(--primary-color); }
        .quiz-tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--primary-color);
        }

        /* Quiz Card Styles */
        .quiz-card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
            margin-bottom: 16px;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .quiz-card:hover {
            transform: translateY(-3px);
            border-color: #cbd5e1;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
        }
        .quiz-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        /* Status Colors */
        .status-active { background: #eff6ff; color: #2563eb; }
        .status-passed { background: #ecfdf5; color: #10b981; }
        .status-failed { background: #fef2f2; color: #dc2626; }
        
        .quiz-details { flex-grow: 1; }
        .quiz-title { font-size: 16px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
        .quiz-course { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        
        .quiz-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }
        .quiz-meta span { display: flex; align-items: center; gap: 4px; }
        
        .badge-custom { padding: 4px 10px; border-radius: 6px; font-weight: 600; font-size: 11px; letter-spacing: 0.3px; display: inline-block; margin-top: 8px;}

        .quiz-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 140px;
            justify-content: flex-end;
        }
    </style>
    <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Public Navbar Component -->
    <div id="public-navbar"></div>
    <!-- Main Navigation Fixed Sidebar -->
    <aside class="dashboard-sidebar" id="app-sidebar"></aside>
    <!-- Main Workspace View -->
    <div class="dashboard-main-view">

        <!-- Container Content Inner Workspace -->
        <div class="workspace-container">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 fw-bold m-0" style="font-weight: 800; font-size: 28px;" data-i18n="quizzes_title">កម្រងសំណួរ</h1>
                    <p class="text-muted small m-0 mt-1" data-i18n="quizzes_desc">សាកល្បងចំណេះដឹងរបស់អ្នក ធ្វើកម្រងសំណួរ និងតាមដានពិន្ទុរបស់អ្នក។</p>
                </div>
            </div>

            <!-- Quiz Status Filter Tabs -->
            <div class="quiz-tabs" id="quiz-tabs-container"></div>

            <!-- Quiz List -->
            <div class="quiz-list" id="quiz-list-container"></div>

            <!-- កន្លែងបង្ហាញលេខទំព័រ (Pagination) -->
            <nav class="mt-5 d-flex justify-content-center" aria-label="Page navigation">
                <ul class="pagination pagination-lg align-items-center" id="quizPagination">
                    <!-- លេខទំព័រនឹងលោតចូលទីនេះតាមរយៈ JavaScript -->
                </ul>
            </nav>
        </div>
    </div>

    <!-- Quiz Results Modal Pop-up -->
    <div class="modal fade" id="quizResultsModal" tabindex="-1" aria-labelledby="quizResultsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow" style="border-radius: 20px; border: none;">
                <div class="modal-header border-bottom-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center px-4 pb-5 pt-0">
                    <div class="mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success rounded-circle mb-3" style="width: 80px; height: 80px;">
                            <i class="bi bi-check-lg" style="font-size: 40px;"></i>
                        </div>
                        <h3 class="fw-bold mb-1" data-i18n="modal_congrats">សូមអបអរសាទរ!</h3>
                        <p class="text-muted small" data-i18n="modal_desc">អ្នកបានប្រឡងជាប់កម្រងសំណួរនេះដោយជោគជ័យ។</p>
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <div class="bg-light rounded-4 p-3 border border-light-subtle h-100">
                                <div class="text-muted small mb-1 fw-semibold" data-i18n="your_score">ពិន្ទុរបស់អ្នក</div>
                                <h2 class="fw-bold text-success m-0">90%</h2>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="bg-light rounded-4 p-3 border border-light-subtle h-100">
                                <div class="text-muted small mb-1 fw-semibold" data-i18n="passing_score">ពិន្ទុជាប់</div>
                                <h2 class="fw-bold text-dark m-0">80%</h2>
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between text-start bg-primary bg-opacity-10 p-3 rounded-4 mb-4">
                        <div>
                            <div class="small fw-semibold text-primary mb-1" data-i18n="correct_answers">ចម្លើយត្រឹមត្រូវ</div>
                            <div class="fw-bold text-dark fs-5">13 <span class="fw-normal text-muted" style="font-size: 14px;">/ 15</span></div>
                        </div>
                        <div class="text-end">
                            <div class="small fw-semibold text-primary mb-1" data-i18n="time_spent">ចំណាយពេល</div>
                            <div class="fw-bold text-dark fs-5">12:45 <span class="fw-normal text-muted" style="font-size: 14px;">/ 20:00</span></div>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-light fw-semibold flex-grow-1 py-2" data-bs-dismiss="modal" style="border-radius: 10px;" data-i18n="close">បិទ</button>
                        <button type="button" class="btn btn-primary fw-semibold flex-grow-1 py-2" style="border-radius: 10px;" data-i18n="review_answers">ពិនិត្យចម្លើយឡើងវិញ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Public Footer Component -->
    <!-- <div id="public-footer"></div> -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // វចនានុក្រមបកប្រែសម្រាប់ទំព័រកម្រងសំណួរ
            const pageTranslations = {
                'km': {
                    'quizzes_title': 'កម្រងសំណួរ', 'quizzes_desc': 'សាកល្បងចំណេះដឹងរបស់អ្នក ធ្វើកម្រងសំណួរ និងតាមដានពិន្ទុរបស់អ្នក។',
                    'tab_all_quizzes': 'កម្រងសំណួរទាំងអស់', 'tab_active': 'កំពុងដំណើរការ', 'tab_completed': 'បានបញ្ចប់',
                    'no_quizzes': 'មិនមានកម្រងសំណួរក្នុងប្រភេទនេះទេ',
                    'modal_congrats': 'សូមអបអរសាទរ!', 'modal_desc': 'អ្នកបានប្រឡងជាប់កម្រងសំណួរនេះដោយជោគជ័យ។',
                    'your_score': 'ពិន្ទុរបស់អ្នក', 'passing_score': 'ពិន្ទុជាប់', 'correct_answers': 'ចម្លើយត្រឹមត្រូវ', 'time_spent': 'ចំណាយពេល',
                    'close': 'បិទ', 'review_answers': 'ពិនិត្យចម្លើយឡើងវិញ', 'questions_count': 'សំណួរ',
                    'btn_continue': 'បន្ត', 'btn_view_results': 'មើលលទ្ធផល',
                    'quiz_html_title': 'កម្រងសំណួរ: មូលដ្ឋានគ្រឹះ HTML', 'quiz_ui_title': 'កម្រងសំណួរ: ការរចនា UI/UX',
                    'course_web_dev': 'វគ្គបណ្តុះបណ្តាលការអភិវឌ្ឍគេហទំព័រពេញលេញ 2026', 'course_ui_ux': 'Google UX Design Professional Certificate',
                    'status_active': 'កំពុងដំណើរការ', 'status_completed_90': 'បានបញ្ចប់ (90%)',
                    'time_20_min': '20 នាទី', 'time_30_min': '30 នាទី'
                },
                'en': {
                    'quizzes_title': 'Quizzes', 'quizzes_desc': 'Test your knowledge, take quizzes, and track your scores.',
                    'tab_all_quizzes': 'All Quizzes', 'tab_active': 'Active', 'tab_completed': 'Completed',
                    'no_quizzes': 'No quizzes found in this category.',
                    'modal_congrats': 'Congratulations!', 'modal_desc': 'You have successfully passed this quiz.',
                    'your_score': 'Your Score', 'passing_score': 'Passing Score', 'correct_answers': 'Correct Answers', 'time_spent': 'Time Spent',
                    'close': 'Close', 'review_answers': 'Review Answers', 'questions_count': 'questions',
                    'btn_continue': 'Continue', 'btn_view_results': 'View Results',
                    'quiz_html_title': 'Quiz: HTML Fundamentals', 'quiz_ui_title': 'Quiz: UI/UX Design',
                    'course_web_dev': 'The Complete 2026 Fullstack Web Developer', 'course_ui_ux': 'Google UX Design Professional Certificate',
                    'status_active': 'In Progress', 'status_completed_90': 'Completed (90%)',
                    'time_20_min': '20 Mins', 'time_30_min': '30 Mins'
                }
            };

            let quizzesData = [];

            let currentFilter = 'all';
            let currentPage = 1;
            const itemsPerPage = 5; // កំណត់ចំនួនកម្រងសំណួរក្នុងមួយទំព័រ
            const tabsContainer = document.getElementById('quiz-tabs-container');
            const listContainer = document.getElementById('quiz-list-container');

            function applyPageTranslations() {
                const lang = localStorage.getItem('language') || 'km';
                const t = pageTranslations[lang] || pageTranslations['km'];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (t[key]) el.innerHTML = t[key];
                });
                renderTabs(); 
                renderQuizzes();
            }
            document.addEventListener('languageChanged', applyPageTranslations);

            // ២. មុខងារសម្រាប់ Render ផ្ទាំង Tabs ឲ្យលោតលេខត្រូវនឹងទិន្នន័យ
            function renderTabs() {
                if (!tabsContainer) return;
                const lang = localStorage.getItem('language') || 'km';
                const tr = (key) => pageTranslations[lang] ? pageTranslations[lang][key] : key;

                const total = quizzesData.length;
                const active = quizzesData.filter(q => q.status === 'active').length;
                const completed = quizzesData.filter(q => q.status === 'completed').length;

                tabsContainer.innerHTML = `
                    <button class="quiz-tab-btn ${currentFilter === 'all' ? 'active' : ''}" data-filter="all">${tr('tab_all_quizzes')} (${total})</button>
                    <button class="quiz-tab-btn ${currentFilter === 'active' ? 'active' : ''}" data-filter="active">${tr('tab_active')} (${active})</button>
                    <button class="quiz-tab-btn ${currentFilter === 'completed' ? 'active' : ''}" data-filter="completed">${tr('tab_completed')} (${completed})</button>
                `;

                tabsContainer.querySelectorAll('.quiz-tab-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        currentFilter = this.getAttribute('data-filter');
                        currentPage = 1;
                        renderTabs();
                        renderQuizzes();
                    });
                });
            }

            // ៣. មុខងារសម្រាប់ Render កាតកម្រងសំណួរ និងចម្រាញ់ (Filter) ទិន្នន័យ
            function renderQuizzes() {
                if (!listContainer) return;
                const lang = localStorage.getItem('language') || 'km';
                const tr = (key) => pageTranslations[lang] ? pageTranslations[lang][key] : key;
                
                const filteredData = quizzesData.filter(q => {
                    if (currentFilter === 'all') return true;
                    return q.status === currentFilter;
                });

                // ការគណនាចំនួនទំព័រ
                const totalPages = Math.ceil(filteredData.length / itemsPerPage);
                if (currentPage > totalPages) currentPage = totalPages || 1;

                const startIndex = (currentPage - 1) * itemsPerPage;
                const visibleData = filteredData.slice(startIndex, startIndex + itemsPerPage);

                if (visibleData.length === 0) {
                    listContainer.innerHTML = `<div class="text-center py-5"><h5 class="text-muted">${tr('no_quizzes')}</h5></div>`;
                    renderPagination(0, 1);
                    return;
                }

                listContainer.innerHTML = visibleData.map(q => `
                    <div class="quiz-card">
                        <div class="quiz-icon ${q.iconClass}"><i class="bi ${q.icon}"></i></div>
                        <div class="quiz-details">
                            <h3 class="quiz-title">${tr(q.titleKey)}</h3>
                            <p class="quiz-course">${tr(q.courseKey)}</p>
                            <div class="quiz-meta">
                                <span><i class="bi bi-list-ol"></i> ${q.questions} ${tr('questions_count')}</span>
                                <span><i class="bi bi-stopwatch"></i> ${tr(q.timeKey)}</span>
                            </div>
                            <span class="badge-custom ${q.badgeClass}">${tr(q.statusTextKey)}</span>
                        </div>
                        <div class="quiz-actions">
                            <button class="btn ${q.actionBtnClass} btn-sm px-4 fw-semibold" style="border-radius: 8px;" ${q.actionTarget}>${tr(q.actionTextKey)}</button>
                        </div>
                    </div>
                `).join("");

                renderPagination(totalPages, currentPage);
            }

            // មុខងារ Render លេខទំព័រ (Pagination)
            function renderPagination(totalPages, current) {
                const paginationContainer = document.getElementById('quizPagination');
                if (!paginationContainer) return;

                if (totalPages <= 1) {
                    paginationContainer.innerHTML = '';
                    return;
                }

                let html = '';
                const prevDisabled = current === 1 ? 'disabled' : '';
                html += `<li class="page-item ${prevDisabled}"><a class="page-link shadow-sm border-0 fw-bold text-dark mx-1" href="#" data-page="${current - 1}" style="border-radius: 10px;"><i class="bi bi-chevron-left"></i></a></li>`;

                for (let i = 1; i <= totalPages; i++) {
                    const activeClass = current === i ? 'active' : '';
                    const colorClass = current === i ? 'bg-primary text-white' : 'text-dark';
                    html += `<li class="page-item ${activeClass}"><a class="page-link shadow-sm border-0 fw-bold ${colorClass} mx-1" href="#" data-page="${i}" style="border-radius: 10px;">${i}</a></li>`;
                }

                const nextDisabled = current === totalPages ? 'disabled' : '';
                html += `<li class="page-item ${nextDisabled}"><a class="page-link shadow-sm border-0 fw-bold text-dark mx-1" href="#" data-page="${current + 1}" style="border-radius: 10px;"><i class="bi bi-chevron-right"></i></a></li>`;

                paginationContainer.innerHTML = html;
            }

            // មុខងារចុចលើលេខទំព័រ
            const paginationContainer = document.getElementById('quizPagination');
            if (paginationContainer) {
                paginationContainer.addEventListener('click', function(e) {
                    e.preventDefault();
                    const link = e.target.closest('.page-link');
                    if (!link) return;
                    
                    const parent = link.closest('.page-item');
                    if (parent.classList.contains('disabled') || parent.classList.contains('active')) return;

                    const page = parseInt(link.getAttribute('data-page'));
                    if (page && !isNaN(page)) {
                        currentPage = page;
                        renderQuizzes();
                        window.scrollTo({ top: document.getElementById('quiz-list-container').offsetTop - 150, behavior: 'smooth' });
                    }
                });
            }

            // ៤. ទាញយកទិន្នន័យពី JSON
            async function initializePage() {
                try {
                    // អានទិន្នន័យពី LocalStorage ជាមុនសិន
                    const localQuizzes = localStorage.getItem('quizzes_db');
                    
                    if (localQuizzes) {
                        quizzesData = JSON.parse(localQuizzes);
                    } else {
                        // ទិន្នន័យបម្រុង (Fallback Data) ក្នុងករណីមិនទាន់មានទិន្នន័យក្នុង LocalStorage
                        quizzesData = [
                            {
                                id: 1,
                                status: 'active',
                                iconClass: 'status-active text-primary',
                                icon: 'bi-journal-text',
                                title: 'កម្រងសំណួរ: មូលដ្ឋានគ្រឹះ HTML', titleKey: 'quiz_html_title',
                                course: 'វគ្គបណ្តុះបណ្តាលការអភិវឌ្ឍគេហទំព័រពេញលេញ 2026', courseKey: 'course_web_dev',
                                questions: 15,
                                time: '20 នាទី', timeKey: 'time_20_min',
                                badgeClass: 'status-active',
                                statusText: 'កំពុងដំណើរការ', statusTextKey: 'status_active',
                                actionBtnClass: 'btn-primary', actionTextKey: 'btn_continue', actionTarget: ''
                            },
                            {
                                id: 2,
                                status: 'completed',
                                iconClass: 'status-passed text-success',
                                icon: 'bi-check-circle-fill',
                                title: 'កម្រងសំណួរ: ការរចនា UI/UX', titleKey: 'quiz_ui_title',
                                course: 'Google UX Design Professional Certificate', courseKey: 'course_ui_ux',
                                questions: 20,
                                time: '30 នាទី', timeKey: 'time_30_min',
                                badgeClass: 'status-passed',
                                statusText: 'បានបញ្ចប់ (90%)', statusTextKey: 'status_completed_90',
                                actionBtnClass: 'btn-outline-secondary', actionTextKey: 'btn_view_results', actionTarget: 'data-bs-toggle="modal" data-bs-target="#quizResultsModal"'
                            }
                        ];
                    }
                    applyPageTranslations();
                } catch (error) {
                    console.error('Failed to load quizzes data:', error);
                    if (listContainer) listContainer.innerHTML = '<div class="text-center py-5"><h5 class="text-danger">Failed to load data. Please try again later.</h5></div>';
                }
            }
            initializePage();
        });
    </script>
</body>
</html>
