<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Learn - កិច្ចការ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="../assets/css/style.css" rel="stylesheet">
    <link href="../assets/css/assignments.css" rel="stylesheet">
</head>
<body>
    <!-- Public Navbar Component -->
    <div id="public-navbar"></div>
    <!-- Main Navigation Fixed Sidebar -->
    <aside class="dashboard-sidebar" id="app-sidebar"></aside>

    <!-- Main Workspace View -->
    <div class="dashboard-main-view">

        <!-- Container Content Inner Workspace -->
        <div class="workspace-container">
            
            <!-- Modern Page Banner -->
            <div class="page-title-banner fade-in-scale" style="animation-delay: 0s; opacity: 0;">
                <div class="d-flex flex-wrap justify-content-between align-items-center gap-4 position-relative z-1">
                    <div class="text-white">
                        <h1 class="h3 fw-bold m-0 mb-2" style="font-size: 32px; letter-spacing: -0.5px;" data-i18n="assignments_title">កិច្ចការ</h1>
                        <p class="text-white-50 m-0 fs-6" data-i18n="assignments_desc">តាមដានកិច្ចការដែលមិនទាន់សម្រេច បញ្ជូនកិច្ចការ និងពិនិត្យមើលពិន្ទុរបស់អ្នក។</p>
                    </div>
                </div>
            </div>

            <!-- Assignment Status Filter Tabs -->
            <div class="assignment-tabs fade-in-scale" id="assignment-tabs-container" style="animation-delay: 0.1s; opacity: 0;"></div>

            <!-- Assignment List -->
            <div class="assignment-list" id="assignment-list-container"></div>

            <!-- កន្លែងបង្ហាញលេខទំព័រ (Pagination) -->
            <nav class="mt-5 d-flex justify-content-center" aria-label="Page navigation">
                <ul class="pagination pagination-lg align-items-center" id="assignmentPagination">
                    <!-- លេខទំព័រនឹងលោតចូលទីនេះតាមរយៈ JavaScript -->
                </ul>
            </nav>
        </div>
    </div>

    <!-- Public Footer Component -->
    <div id="public-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // វចនានុក្រមបកប្រែសម្រាប់ទំព័រកិច្ចការ
            const pageTranslations = {
                'km': {
                    'assignments_title': 'កិច្ចការ', 'assignments_desc': 'តាមដានកិច្ចការដែលមិនទាន់សម្រេច បញ្ជូនកិច្ចការ និងពិនិត្យមើលពិន្ទុរបស់អ្នក។',
                    'tab_all': 'ទាំងអស់', 'tab_pending': 'មិនទាន់សម្រេច', 'tab_submitted': 'បានបញ្ជូន', 'tab_graded': 'បានដាក់ពិន្ទុ',
                    'no_assignments': 'មិនមានកិច្ចការក្នុងប្រភេទនេះទេ',
                    'btn_submit_task': 'បញ្ជូនកិច្ចការ', 'btn_view_task': 'មើលកិច្ចការ', 'btn_view_feedback': 'មើលមតិកែលម្អ',
                    'status_pending': 'មិនទាន់សម្រេច', 'status_submitted': 'បានបញ្ជូន', 'status_graded': 'បានដាក់ពិន្ទុ',
                    'due_tomorrow': 'ផុតកំណត់: ថ្ងៃស្អែក', 'pending_grading': 'រង់ចាំការដាក់ពិន្ទុ', 'score_95': 'ពិន្ទុ: 95/100',
                    'task_landing_page': 'ការរចនាទំព័រចុះចត (Landing Page)', 'task_html': 'បង្កើតទំព័រ HTML ដំបូង', 'task_css_quiz': 'កម្រងសំណួរ CSS មូលដ្ឋាន',
                    'course_ui_ux': 'ថ្នាក់ជំនាញរចនា UI/UX', 'course_web_dev': 'វគ្គបណ្តុះបណ្តាលការអភិវឌ្ឍគេហទំព័រ'
                },
                'en': {
                    'assignments_title': 'Assignments', 'assignments_desc': 'Track pending assignments, submit tasks, and check your grades.',
                    'tab_all': 'All', 'tab_pending': 'Pending', 'tab_submitted': 'Submitted', 'tab_graded': 'Graded',
                    'no_assignments': 'No assignments found in this category.',
                    'btn_submit_task': 'Submit Task', 'btn_view_task': 'View Task', 'btn_view_feedback': 'View Feedback',
                    'status_pending': 'Pending', 'status_submitted': 'Submitted', 'status_graded': 'Graded',
                    'due_tomorrow': 'Due: Tomorrow', 'pending_grading': 'Pending Grading', 'score_95': 'Score: 95/100',
                    'task_landing_page': 'Landing Page Design', 'task_html': 'Create your first HTML page', 'task_css_quiz': 'Basic CSS Quiz',
                    'course_ui_ux': 'UI/UX Design Masterclass', 'course_web_dev': 'Web Development Bootcamp'
                }
            };

            let assignmentsData = [];

            let currentFilter = 'all';
            let currentPage = 1;
            const itemsPerPage = 5; // កំណត់ចំនួនកិច្ចការក្នុងមួយទំព័រ
            const tabsContainer = document.getElementById('assignment-tabs-container');
            const listContainer = document.getElementById('assignment-list-container');

            // អនុគមន៍សម្រាប់បកប្រែទំព័រទាំងមូល
            function applyPageTranslations() {
                const lang = localStorage.getItem('language') || 'km';
                const t = pageTranslations[lang] || pageTranslations['km'];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (t[key]) el.innerHTML = t[key];
                });
                renderTabs(); 
                renderAssignments();
            }
            document.addEventListener('languageChanged', applyPageTranslations);

            // ២. មុខងារសម្រាប់ Render ផ្ទាំង Tabs ឲ្យលោតលេខត្រូវនឹងទិន្នន័យ
            function renderTabs() {
                if (!tabsContainer) return;
                const lang = localStorage.getItem('language') || 'km';
                const tr = (key) => pageTranslations[lang] ? pageTranslations[lang][key] : key;

                const total = assignmentsData.length;
                const pending = assignmentsData.filter(a => a.status === 'pending').length;
                const submitted = assignmentsData.filter(a => a.status === 'submitted').length;
                const graded = assignmentsData.filter(a => a.status === 'graded').length;

                tabsContainer.innerHTML = `
                    <button class="assignment-tab-btn ${currentFilter === 'all' ? 'active' : ''} shadow-sm" data-filter="all">${tr('tab_all')} (${total})</button>
                    <button class="assignment-tab-btn ${currentFilter === 'pending' ? 'active' : ''} shadow-sm" data-filter="pending">${tr('tab_pending')} (${pending})</button>
                    <button class="assignment-tab-btn ${currentFilter === 'submitted' ? 'active' : ''} shadow-sm" data-filter="submitted">${tr('tab_submitted')} (${submitted})</button>
                    <button class="assignment-tab-btn ${currentFilter === 'graded' ? 'active' : ''} shadow-sm" data-filter="graded">${tr('tab_graded')} (${graded})</button>
                `;

                tabsContainer.querySelectorAll('.assignment-tab-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        currentFilter = this.getAttribute('data-filter');
                        currentPage = 1;
                        renderTabs();
                        renderAssignments();
                    });
                });
            }

            // ៣. មុខងារសម្រាប់ Render កាតកិច្ចការ និងចម្រាញ់ (Filter) ទិន្នន័យ
            function renderAssignments() {
                if (!listContainer) return;
                const lang = localStorage.getItem('language') || 'km';
                const tr = (key) => pageTranslations[lang] ? pageTranslations[lang][key] : key;
                
                const filteredData = assignmentsData.filter(a => {
                    if (currentFilter === 'all') return true;
                    return a.status === currentFilter;
                });

                // ការគណនាចំនួនទំព័រ
                const totalPages = Math.ceil(filteredData.length / itemsPerPage);
                if (currentPage > totalPages) currentPage = totalPages || 1;

                const startIndex = (currentPage - 1) * itemsPerPage;
                const visibleData = filteredData.slice(startIndex, startIndex + itemsPerPage);

                if (visibleData.length === 0) {
                    listContainer.innerHTML = `<div class="text-center py-5"><h5 class="text-muted">${tr('no_assignments')}</h5></div>`;
                    renderPagination(0, 1);
                    return;
                }

                listContainer.innerHTML = visibleData.map((a, index) => {
                    const calendarBtnHtml = a.dueDate ? `
                        <button class="btn btn-light px-3 py-2 fw-semibold border text-dark shadow-sm" style="border-radius: 12px;" title="បន្ថែមទៅប្រតិទិន" onclick="addToCalendar(event, '${a.title}', '${a.course}', '${a.dueDate}')">
                            <i class="bi bi-calendar-plus"></i>
                        </button>
                    ` : '';

                    return `
                    <div class="assignment-card fade-in-scale" style="animation-delay: ${index * 0.05 + 0.15}s; opacity: 0;">
                        <div class="d-flex flex-column flex-md-row gap-4 w-100 align-items-md-center">
                            <div class="assignment-icon ${a.iconClass} shadow-sm"><i class="bi ${a.icon}"></i></div>
                            <div class="assignment-details flex-grow-1">
                                <h3 class="assignment-title mb-1 fw-bold fs-5">${tr(a.titleKey)}</h3>
                                <p class="assignment-course text-muted small mb-3">${tr(a.courseKey)}</p>
                                <div class="assignment-meta d-flex flex-wrap gap-3 align-items-center">
                                    <span class="badge-custom ${a.iconClass}">${tr(a.statusTextKey)}</span>
                                    <span class="text-muted small fw-medium"><i class="bi ${a.metaIcon} ${a.metaIconColor || ''} me-1 fs-6 align-middle"></i> ${tr(a.metaTextKey)}</span>
                                </div>
                            </div>
                            <div class="assignment-actions mt-3 mt-md-0 d-flex gap-2">
                                ${calendarBtnHtml}
                                <button class="btn ${a.actionBtnClass} px-4 py-2 fw-bold shadow-sm" style="border-radius: 12px;">${tr(a.actionTextKey)}</button>
                            </div>
                        </div>
                    </div>
                `}).join("");
                
                renderPagination(totalPages, currentPage);
            }

            // មុខងារ Render លេខទំព័រ (Pagination)
            function renderPagination(totalPages, current) {
                const paginationContainer = document.getElementById('assignmentPagination');
                if (!paginationContainer) return;

                if (totalPages <= 1) {
                    paginationContainer.innerHTML = '';
                    return;
                }

                let html = '';
                const prevDisabled = current === 1 ? 'disabled' : '';
                html += `<li class="page-item ${prevDisabled}"><a class="page-link shadow-sm border-0 fw-bold text-dark mx-1" href="#" data-page="${current - 1}" style="border-radius: 10px;"><i class="bi bi-chevron-left"></i></a></li>`;

                for (let i = 1; i <= totalPages; i++) {
                    const activeClass = current === i ? 'active' : '';
                    const colorClass = current === i ? 'bg-primary text-white' : 'text-dark';
                    html += `<li class="page-item ${activeClass}"><a class="page-link shadow-sm border-0 fw-bold ${colorClass} mx-1" href="#" data-page="${i}" style="border-radius: 10px;">${i}</a></li>`;
                }

                const nextDisabled = current === totalPages ? 'disabled' : '';
                html += `<li class="page-item ${nextDisabled}"><a class="page-link shadow-sm border-0 fw-bold text-dark mx-1" href="#" data-page="${current + 1}" style="border-radius: 10px;"><i class="bi bi-chevron-right"></i></a></li>`;

                paginationContainer.innerHTML = html;
            }

            // មុខងារចុចលើលេខទំព័រ
            const paginationContainer = document.getElementById('assignmentPagination');
            if (paginationContainer) {
                paginationContainer.addEventListener('click', function(e) {
                    e.preventDefault();
                    const link = e.target.closest('.page-link');
                    if (!link) return;
                    
                    const parent = link.closest('.page-item');
                    if (parent.classList.contains('disabled') || parent.classList.contains('active')) return;

                    const page = parseInt(link.getAttribute('data-page'));
                    if (page && !isNaN(page)) {
                        currentPage = page;
                        renderAssignments();
                        window.scrollTo({ top: document.getElementById('assignment-list-container').offsetTop - 150, behavior: 'smooth' });
                    }
                });
            }

            // ៥. ទាញយកទិន្នន័យពី JSON
            async function initializePage() {
                try {
                    // អានទិន្នន័យពី LocalStorage ជាមុនសិន
                    const localAssignments = localStorage.getItem('assignments_db');
                    
                    if (localAssignments) {
                        assignmentsData = JSON.parse(localAssignments);
                    } else {
                        // ទិន្នន័យបម្រុង (Fallback Data) ក្នុងករណីមិនទាន់មានទិន្នន័យក្នុង LocalStorage
                        assignmentsData = [
                            {
                                id: 1,
                                status: 'pending',
                                iconClass: 'bg-warning bg-opacity-10 text-warning',
                                icon: 'bi-hourglass-split',
                                title: 'ការរចនាទំព័រចុះចត (Landing Page)', titleKey: 'task_landing_page',
                                course: 'ថ្នាក់ជំនាញរចនា UI/UX', courseKey: 'course_ui_ux',
                                statusText: 'មិនទាន់សម្រេច', statusTextKey: 'status_pending',
                                metaIcon: 'bi-calendar-event', metaTextKey: 'due_tomorrow',
                                actionBtnClass: 'btn-primary', actionTextKey: 'btn_submit_task',
                                dueDate: '2026-10-20T23:59:59'
                            },
                            {
                                id: 2,
                                status: 'submitted',
                                iconClass: 'bg-primary bg-opacity-10 text-primary',
                                icon: 'bi-cloud-arrow-up-fill',
                                title: 'បង្កើតទំព័រ HTML ដំបូង', titleKey: 'task_html',
                                course: 'វគ្គបណ្តុះបណ្តាលការអភិវឌ្ឍគេហទំព័រ', courseKey: 'course_web_dev',
                                statusText: 'បានបញ្ជូន', statusTextKey: 'status_submitted',
                                metaIcon: 'bi-clock-history', metaTextKey: 'pending_grading',
                                actionBtnClass: 'btn-outline-secondary', actionTextKey: 'btn_view_task'
                            },
                            {
                                id: 3,
                                status: 'graded',
                                iconClass: 'bg-success bg-opacity-10 text-success',
                                icon: 'bi-check-circle-fill',
                                title: 'កម្រងសំណួរ CSS មូលដ្ឋាន', titleKey: 'task_css_quiz',
                                course: 'វគ្គបណ្តុះបណ្តាលការអភិវឌ្ឍគេហទំព័រ', courseKey: 'course_web_dev',
                                statusText: 'បានដាក់ពិន្ទុ', statusTextKey: 'status_graded',
                                metaIcon: 'bi-star-fill', metaIconColor: 'text-warning', metaTextKey: 'score_95',
                                actionBtnClass: 'btn-outline-secondary', actionTextKey: 'btn_view_feedback'
                            }
                        ];
                    }
                    applyPageTranslations();
                } catch (error) {
                    console.error('Failed to load assignments data:', error);
                    if (listContainer) listContainer.innerHTML = '<div class="text-center py-5"><h5 class="text-danger">Failed to load data. Please try again later.</h5></div>';
                }
            }
            initializePage();

            // ៤. មុខងារសម្រាប់បង្កើត Link បន្ថែមទៅ Google Calendar
            window.addToCalendar = function(event, title, course, dueDate) {
                event.stopPropagation(); // ការពារកុំឲ្យចុចលើកាតទាំងមូល

                const eventEndDate = new Date(dueDate);
                // កំណត់ឲ្យ Event ចាប់ផ្តើម ១ ម៉ោងមុនថ្ងៃផុតកំណត់
                const eventStartDate = new Date(eventEndDate.getTime() - 60 * 60 * 1000);

                // បំប្លែងទៅជាទម្រង់របស់ Google Calendar (YYYYMMDDTHHMMSSZ)
                const toGoogleFormat = (date) => {
                    return date.toISOString().replace(/-|:|\.\d+/g, '');
                };

                const googleCalendarUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('Deadline: ' + title)}&dates=${toGoogleFormat(eventStartDate)}/${toGoogleFormat(eventEndDate)}&details=${encodeURIComponent('កិច្ចការសម្រាប់វគ្គសិក្សា: ' + course + '. សូមបញ្ជូនឲ្យបានទាន់ពេលវេលា។')}&location=${encodeURIComponent('Smart Learn Platform')}`;
                
                window.open(googleCalendarUrl, '_blank');
            }
        });
    </script>
</body>
</html>
